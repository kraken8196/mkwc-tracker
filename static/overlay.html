<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKWC 2026 — Stats Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
  /* OBS browser source: fully transparent background so only the panel shows. */
  html,body{margin:0;padding:0;background:transparent;}
  *{box-sizing:border-box;}

  :root{
    --gold:#FFCE54;
    --dim:#D9B996;
    --cream:#FBEFDA;
    --red:#E5484D;
  }

  /* ---- Theme: MKWC (orange/gold, matches the site) ---- */
  .ov[data-theme="mkwc"]{
    --panel:linear-gradient(160deg, rgba(58,32,14,0.94), rgba(26,13,3,0.94));
    --edge:rgba(255,206,84,0.55);
    --label:#F2D9A8;
    --value:#FBEFDA;
    --value-lose:#B79A74;
    --accent:#FFCE54;
    --head-bg:linear-gradient(180deg, rgba(255,206,84,0.16), rgba(240,148,47,0.05));
  }
  /* ---- Theme: neutral (dark, blends into any stream) ---- */
  .ov[data-theme="neutral"]{
    --panel:linear-gradient(160deg, rgba(18,20,26,0.92), rgba(10,11,15,0.94));
    --edge:rgba(255,255,255,0.22);
    --label:#B9C0CC;
    --value:#F2F4F8;
    --value-lose:#7C8494;
    --accent:#FFCE54;
    --head-bg:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
  }

  body{
    display:flex;align-items:flex-start;justify-content:center;
    padding:14px;
    font-family:'Rajdhani',sans-serif;
    color:var(--value);
    -webkit-font-smoothing:antialiased;
  }

  .ov{
    width:100%;max-width:720px;
    background:var(--panel);
    border:1px solid var(--edge);
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.25);
    overflow:hidden;
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
  }

  /* Header row: team A | title | team B */
  .ov-head{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    gap:12px;padding:12px 16px 10px;background:var(--head-bg);
  }
  .ov-team{display:flex;align-items:center;gap:10px;min-width:0;}
  .ov-team.b{flex-direction:row-reverse;text-align:right;}
  .ov-flag{
    width:46px;height:31px;border-radius:5px;flex-shrink:0;overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,0.35) inset, 0 2px 5px rgba(0,0,0,0.5);
    background:#222;
  }
  .ov-flag img{width:100%;height:100%;object-fit:cover;display:block;}
  .ov-name{
    font-weight:700;font-size:26px;line-height:1;letter-spacing:0.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
    text-shadow:0 2px 4px rgba(0,0,0,0.55);
  }
  .ov-title{
    font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:12px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--label);text-align:center;white-space:nowrap;
  }
  .ov-title .vs{color:var(--accent);}

  /* Stat rows */
  .ov-body{padding:6px 16px 14px;}
  .ov-row{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    gap:10px;padding:9px 2px;border-top:1px solid rgba(255,255,255,0.07);
  }
  .ov-row:first-child{border-top:none;}
  .ov-val{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;line-height:1;
    color:var(--value-lose);
  }
  .ov-val.a{text-align:right;}
  .ov-val.b{text-align:left;}
  .ov-val.win{color:var(--accent);text-shadow:0 0 14px rgba(255,206,84,0.35);}
  .ov-lbl{
    font-family:'JetBrains Mono',monospace;font-weight:500;font-size:11px;
    letter-spacing:0.08em;text-transform:uppercase;color:var(--label);
    text-align:center;white-space:nowrap;min-width:118px;
  }

  /* small brand mark */
  .ov-foot{
    display:flex;align-items:center;justify-content:center;gap:7px;
    padding:6px 0 9px;font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--label);opacity:0.75;
  }
  .ov-foot b{color:var(--accent);}

  /* States */
  .ov-msg{
    padding:22px;text-align:center;font-family:'JetBrains Mono',monospace;
    font-size:13px;color:var(--label);
  }
  .hidden{display:none !important;}

  /* Subtle entrance so a value change doesn't hard-cut on stream. */
  .ov-val{transition:color .25s ease;}
</style>
</head>
<body>
<div class="ov" id="ov" data-theme="mkwc">
  <div class="ov-msg" id="ovMsg">Loading…</div>
  <div class="hidden" id="ovContent">
    <div class="ov-head">
      <div class="ov-team a"><span class="ov-flag"><img id="flagA" alt=""></span><span class="ov-name" id="nameA">—</span></div>
      <div class="ov-title"><span id="titleText">Head&nbsp;to&nbsp;Head</span></div>
      <div class="ov-team b"><span class="ov-flag"><img id="flagB" alt=""></span><span class="ov-name" id="nameB">—</span></div>
    </div>
    <div class="ov-body" id="ovRows"></div>
    <div class="ov-foot"><b>MKWC 2026</b> · stats</div>
  </div>
</div>

<!-- Reuse the site's data loading + stat helpers, but in overlay mode (no site DOM). -->
<script>window.MKWC_OVERLAY = true;</script>
<script src="assets/data.js"></script>
<script>
/* =========================================================
   OBS STATS OVERLAY — head-to-head team comparison.
   URL params:
     ?a=FR&b=BRA         the two team tags to compare (required)
     &theme=mkwc|neutral colour theme (default mkwc)
     &lang=fr|en|es|ja   language for labels/team names (default en)
     &title=...          optional custom centre title
   Data comes from Supabase via the site's loadState(); it refreshes on a timer,
   and only touches the DOM when a value actually changed (no flicker on stream).
========================================================= */
(function(){
  const params = new URLSearchParams(location.search);
  const tagA = (params.get('a')||'').toUpperCase();
  const tagB = (params.get('b')||'').toUpperCase();
  const theme = params.get('theme')==='neutral' ? 'neutral' : 'mkwc';
  const customTitle = params.get('title');
  const debug = params.has('debug');
  document.getElementById('ov').setAttribute('data-theme', theme);

  // Surface any uncaught error on screen (helps diagnose a stuck "Loading…").
  window.addEventListener('error', e=>{
    const m = document.getElementById('ovMsg');
    if(m && (debug || !window.getTeamStats)) m.textContent = 'Error: ' + (e.message || e.error || 'unknown');
  });
  // If nothing has rendered after 4s, say what's missing instead of hanging on "Loading…".
  setTimeout(()=>{
    const m = document.getElementById('ovMsg');
    if(m && !m.classList.contains('hidden') && m.textContent.indexOf('Error')!==0){
      if(!window.getTeamStats) m.textContent = 'Data not ready (app.js/getTeamStats missing).';
    }
  }, 4000);

  const $ = id => document.getElementById(id);
  function showMsg(m){ $('ovMsg').textContent = m; $('ovMsg').classList.remove('hidden'); $('ovContent').classList.add('hidden'); }
  function showContent(){ $('ovMsg').classList.add('hidden'); $('ovContent').classList.remove('hidden'); }

  // The stats shown, top to bottom. `higher` = a higher number is better (gold).
  // Each `get(tag)` returns a number or null; `fmt` renders it for display.
  function statRows(){
    const ts = window.getTeamStats, ps = window.getPlayerStats, adv = window.getAdvancedStats;
    const player = ps ? ps() : {};
    const advanced = adv ? adv() : {consistency:{},clutch:{},balance:{}};

    // Team average points per player-match, from the same per-player data the site uses.
    function teamAvg(tag){
      const t = player[tag]; if(!t) return null;
      let tot=0,cnt=0; for(const n in t){ tot+=t[n].total; cnt+=t[n].count; }
      return cnt>0 ? tot/cnt : null;
    }
    // Average consistency (lower spread = steadier). We invert for display so "higher = better".
    function teamConsistency(tag){
      const c = advanced.consistency||{}; const vals=[];
      for(const key in c){ if(key.indexOf(tag+'|')===0) vals.push(c[key]); }
      if(!vals.length) return null;
      return vals.reduce((s,v)=>s+v,0)/vals.length;
    }
    function winPct(tag){ const s=ts(tag); return s.played ? (s.w/s.played)*100 : null; }
    function avgDiff(tag){ const s=ts(tag); return s.played ? (s.pf-s.pa)/s.played : null; }
    function played(tag){ const s=ts(tag); return s.played||0; }

    const L = window.t || (k=>k);
    return [
      { label:L('colWinPct'),  get:winPct,          higher:true,  fmt:v=>v==null?'—':Math.round(v)+'%' },
      { label:L('colAvg'),     get:teamAvg,         higher:true,  fmt:v=>v==null?'—':v.toFixed(1) },
      { label:L('colDiff'),    get:avgDiff,         higher:true,  fmt:v=>v==null?'—':(v>0?'+':'')+v.toFixed(1) },
      { label:L('colConsistency'), get:teamConsistency, higher:false, fmt:v=>v==null?'—':v.toFixed(1) },
      { label:L('colWarsPlayed'),  get:played,      higher:null,  fmt:v=>String(v) },
    ];
  }

  let lastSig = null;
  function render(){
    if(!window.getTeamStats){ showMsg('Loading…'); return; }
    if(!tagA || !tagB){ showMsg('Add ?a=FR&b=BRA to the URL (two team tags).'); return; }
    const name = window.teamName || (x=>x);
    const known = window.MKWC_TEAM_TAGS || [];
    if(known.indexOf(tagA)===-1 || known.indexOf(tagB)===-1){
      showMsg('Unknown team tag. Use codes like FR, BRA, JPN…'); return;
    }

    const rows = statRows();
    // Signature: only rebuild the DOM when a displayed value actually changed.
    const sig = tagA+tagB+theme+rows.map(r=>r.fmt(r.get(tagA))+'/'+r.fmt(r.get(tagB))).join('|');
    if(sig === lastSig){ showContent(); return; }
    lastSig = sig;

    $('nameA').textContent = name(tagA);
    $('nameB').textContent = name(tagB);
    $('flagA').src = 'flags/'+tagA+'.png';
    $('flagB').src = 'flags/'+tagB+'.png';
    $('titleText').innerHTML = customTitle
      ? customTitle.replace(/</g,'&lt;')
      : (name(tagA)+' <span class="vs">vs</span> '+name(tagB));

    const html = rows.map(r=>{
      const va = r.get(tagA), vb = r.get(tagB);
      let aWin=false, bWin=false;
      if(r.higher!=null && va!=null && vb!=null && va!==vb){
        const aBetter = r.higher ? va>vb : va<vb;
        aWin = aBetter; bWin = !aBetter;
      }
      return `<div class="ov-row">
        <div class="ov-val a ${aWin?'win':''}">${r.fmt(va)}</div>
        <div class="ov-lbl">${r.label}</div>
        <div class="ov-val b ${bWin?'win':''}">${r.fmt(vb)}</div>
      </div>`;
    }).join('');
    $('ovRows').innerHTML = html;
    showContent();
  }

  // Refresh the underlying data from Supabase, then re-render.
  async function refresh(){
    try{
      if(window.loadState) await window.loadState();
      if(window.migrateAllPlayerData) window.migrateAllPlayerData();
    }catch(e){ /* keep last data */ }
    render();
  }

  // app.js calls this once its first loadState() resolves (overlay mode).
  window.MKWC_ON_READY = function(){
    render();
    setInterval(refresh, 20000); // pull fresh scores every 20s
  };
  // Fallback in case app.js finished before this handler was set.
  if(window.getTeamStats) window.MKWC_ON_READY();
})();
</script>
<script src="assets/app.js"></script>
</body>
</html>
