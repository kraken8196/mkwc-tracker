<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKWC 2026 — Stats Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
  /* OBS browser source: fully transparent background so only the panel shows. */
  html,body{margin:0;padding:0;background:transparent;}
  *{box-sizing:border-box;}

  :root{
    --gold:#FFCE54;
    --dim:#D9B996;
    --cream:#FBEFDA;
    --red:#E5484D;
  }

  /* Two fixed, high-contrast accent colours identify team A vs team B on the bars.
     (The flag by each name already says which team is which; the bar colour just
     separates the two sides cleanly — like the purple/green of a football stat card.) */
  /* ---- Theme: MKWC (orange/gold, matches the site) ---- */
  .ov[data-theme="mkwc"]{
    --panel:linear-gradient(160deg, rgba(58,32,14,0.94), rgba(26,13,3,0.94));
    --edge:rgba(255,206,84,0.55);
    --label:#F2D9A8;
    --value:#FBEFDA;
    --value-lose:#B79A74;
    --accent:#FFCE54;
    --head-bg:linear-gradient(180deg, rgba(255,206,84,0.16), rgba(240,148,47,0.05));
    --team-a:#FFCE54; --team-a-2:#FF9F43;
    --team-b:#59C7E8; --team-b-2:#3A8FE0;
    --bar-track:rgba(0,0,0,0.35);
  }
  /* ---- Theme: neutral (dark, blends into any stream) ---- */
  .ov[data-theme="neutral"]{
    --panel:linear-gradient(160deg, rgba(18,20,26,0.92), rgba(10,11,15,0.94));
    --edge:rgba(255,255,255,0.22);
    --label:#B9C0CC;
    --value:#F2F4F8;
    --value-lose:#7C8494;
    --accent:#FFCE54;
    --head-bg:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    --team-a:#A78BFA; --team-a-2:#8B6FF0;
    --team-b:#C6F04E; --team-b-2:#9FD62E;
    --bar-track:rgba(255,255,255,0.06);
  }

  body{
    display:flex;align-items:flex-start;justify-content:center;
    padding:14px;
    font-family:'Rajdhani',sans-serif;
    color:var(--value);
    -webkit-font-smoothing:antialiased;
  }

  .ov{
    width:100%;max-width:720px;
    background:var(--panel);
    border:1px solid var(--edge);
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.25);
    overflow:hidden;
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
  }

  /* Header row: team A | title | team B */
  .ov-head{
    display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;
    gap:16px;padding:14px 16px 12px;background:var(--head-bg);
  }
  .ov-team{display:flex;align-items:center;justify-content:center;}
  .ov-team.a{justify-content:flex-start;}
  .ov-team.b{justify-content:flex-end;}
  .ov-flag{
    width:58px;height:39px;border-radius:6px;flex-shrink:0;overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,0.35) inset, 0 2px 6px rgba(0,0,0,0.5);
    background:#222;
  }
  .ov-flag img{width:100%;height:100%;object-fit:cover;display:block;}
  /* The matchup title carries the team names. Laid out as [name A | vs | name B] with
     "vs" in a fixed centre column, so the "vs" sits exactly on the card's midline —
     which is where the two content columns meet below. */
  .ov-title{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;column-gap:10px;
    font-family:'Rajdhani',sans-serif;font-weight:700;
    font-size:29px;line-height:1.05;letter-spacing:0.01em;
    color:var(--value);text-shadow:0 2px 5px rgba(0,0,0,0.6);
  }
  .ov-title .ttl-a{text-align:right;}
  .ov-title .ttl-b{text-align:left;}
  .ov-title .ttl-a,.ov-title .ttl-b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .ov-title .vs{
    color:var(--label);font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:16px;text-transform:uppercase;letter-spacing:0.1em;
  }
  /* A custom title lives in the centre cell and spans the row, centred. */
  .ov-title .vs.custom{
    grid-column:1 / -1;font-family:'Rajdhani',sans-serif;font-size:29px;
    text-transform:none;letter-spacing:0.01em;color:var(--value);text-align:center;
  }

  /* Stat rows: a centred label, then value A · split bar · value B (football-card style). */
  .ov-body{padding:10px 16px 14px;}
  .ov-row{padding:9px 0 11px;}
  .ov-lbl{
    font-family:'JetBrains Mono',monospace;font-weight:500;font-size:11px;
    letter-spacing:0.09em;text-transform:uppercase;color:var(--label);
    text-align:center;white-space:nowrap;margin-bottom:7px;
  }
  .ov-bar-line{
    display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:12px;
  }
  .ov-val{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;line-height:1;
    color:var(--value);white-space:nowrap;
  }
  .ov-val.a{text-align:right;}
  .ov-val.b{text-align:left;}
  /* The leading side gets its team colour + a glow; the other stays neutral. */
  .ov-val.a.win{color:var(--team-a);text-shadow:0 0 12px color-mix(in srgb, var(--team-a) 45%, transparent);}
  .ov-val.b.win{color:var(--team-b);text-shadow:0 0 12px color-mix(in srgb, var(--team-b) 45%, transparent);}

  /* The bicolour bar */
  .ov-bar{
    display:flex;height:15px;border-radius:8px;overflow:hidden;
    background:var(--bar-track);box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);
  }
  .ov-bar-a{
    background:linear-gradient(90deg, var(--team-a-2), var(--team-a));
    transition:width .4s ease;border-right:2px solid rgba(0,0,0,0.35);
  }
  .ov-bar-b{
    background:linear-gradient(90deg, var(--team-b), var(--team-b-2));
    transition:width .4s ease;
  }
  /* When one side is exactly 0%, drop its separator so no sliver of it shows. */
  .ov-bar-a.zero{border-right:0;}

  /* ---- Line-up mode: two player columns + line-up averages ---- */
  .lu-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:2px 0 4px;
  }
  .lu-col{display:flex;flex-direction:column;gap:2px;}
  .lu-player{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 12px;border-radius:8px;background:var(--bar-track);
  }
  .lu-col.a .lu-player{border-left:3px solid var(--team-a);}
  .lu-col.b .lu-player{border-right:3px solid var(--team-b);flex-direction:row-reverse;}
  .lu-name{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;color:var(--value);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
  }
  .lu-avg{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--value);
    flex-shrink:0;
  }
  .lu-total-row{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;
    margin-top:8px;padding:10px 12px 2px;border-top:1px solid rgba(255,255,255,0.12);
  }
  .lu-total{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;line-height:1;color:var(--value);
  }
  .lu-total.a{text-align:right;}
  .lu-total.b{text-align:left;}
  .lu-total.a.win{color:var(--team-a);text-shadow:0 0 14px color-mix(in srgb, var(--team-a) 45%, transparent);}
  .lu-total.b.win{color:var(--team-b);text-shadow:0 0 14px color-mix(in srgb, var(--team-b) 45%, transparent);}
  .lu-total-lbl{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--label);text-align:center;white-space:nowrap;
  }

  /* ---- Tracks mode: per-track average comparison ---- */
  .tk-table{display:flex;flex-direction:column;gap:3px;max-height:70vh;overflow-y:auto;}
  .tk-row{
    display:grid;grid-template-columns:1fr minmax(0,1.4fr) 1fr;align-items:center;gap:8px;
    padding:6px 6px;border-radius:7px;background:var(--bar-track);
  }
  .tk-name{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--value);
    text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
  }
  /* Mirror-symmetric: the score hugs the outer edge on each side (A left, B right),
     the ×N sits just inside it. The score has a fixed min-width so the columns of
     numbers line up vertically and both sides mirror exactly. */
  .tk-cell{display:flex;align-items:baseline;gap:6px;}
  .tk-cell.a{justify-content:flex-start;}
  .tk-cell.b{justify-content:flex-end;flex-direction:row-reverse;}
  .tk-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:19px;color:var(--value);min-width:2.4ch;}
  .tk-cell.a .tk-val{text-align:left;}
  .tk-cell.b .tk-val{text-align:right;}
  .tk-cell.a.win .tk-val{color:var(--team-a);}
  .tk-cell.b.win .tk-val{color:var(--team-b);}
  .tk-n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--label);min-width:2.2ch;}
  .tk-cell.a .tk-n{text-align:left;}
  .tk-cell.b .tk-n{text-align:right;}
  .tk-more{
    width:100%;margin:3px 0;padding:8px;border-radius:7px;cursor:pointer;
    background:transparent;border:1px solid var(--edge);color:var(--label);
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  }
  .tk-more:hover{color:var(--value);border-color:var(--accent);}
  .tk-hidden{display:none;}

  /* View tabs — the streamer clicks to switch between Teams / Line-up / Tracks live. */
  .ov-tabs{
    display:flex;gap:6px;justify-content:center;padding:2px 16px 10px;
  }
  .ov-tab{
    flex:0 0 auto;padding:6px 14px;border-radius:999px;cursor:pointer;
    background:var(--bar-track);border:1px solid var(--edge);color:var(--label);
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
    transition:background .15s, color .15s, border-color .15s;
  }
  .ov-tab:hover{color:var(--value);}
  .ov-tab.active{background:var(--accent);color:#20140a;border-color:var(--accent);}

  /* small brand mark */
  .ov-foot{
    display:flex;align-items:center;justify-content:center;gap:7px;
    padding:6px 0 9px;font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--label);opacity:0.75;
  }
  .ov-foot b{color:var(--accent);}

  /* States */
  .ov-msg{
    padding:22px;text-align:center;font-family:'JetBrains Mono',monospace;
    font-size:13px;color:var(--label);
  }
  .hidden{display:none !important;}

  /* Subtle entrance so a value change doesn't hard-cut on stream. */
  .ov-val{transition:color .25s ease;}
</style>
</head>
<body>
<div class="ov" id="ov" data-theme="mkwc">
  <div class="ov-msg" id="ovMsg">Loading…</div>
  <div class="hidden" id="ovContent">
    <div class="ov-head">
      <div class="ov-team a"><span class="ov-flag"><img id="flagA" alt=""></span></div>
      <div class="ov-title">
        <span class="ttl-a" id="ttlA"></span>
        <span class="vs" id="ttlVs">vs</span>
        <span class="ttl-b" id="ttlB"></span>
      </div>
      <div class="ov-team b"><span class="ov-flag"><img id="flagB" alt=""></span></div>
    </div>
    <div class="ov-tabs" id="ovTabs"></div>
    <div class="ov-body" id="ovRows"></div>
    <div class="ov-foot"><b>MKWC 2026</b> · stats</div>
  </div>
</div>

<!-- Reuse the site's data loading + stat helpers, but in overlay mode (no site DOM). -->
<script>window.MKWC_OVERLAY = true;</script>
<script src="assets/data.js"></script>
<script>
/* =========================================================
   OBS STATS OVERLAY — head-to-head team comparison, three views in one overlay
   with clickable tabs (Teams / Line-up / Tracks) the streamer switches live.
   URL params:
     ?a=FR&b=BRA         the two team tags to compare (required)
     &theme=mkwc|neutral colour theme (default mkwc)
     &lang=fr|en|es|ja   language for labels/team names (default en)
     &mode=team|lineup|tracks   which tab is shown first (default team)
     &pa=Name1,Name2…&pb=…      6-v-6 line-ups; enables the Line-up tab
     &title=...          optional custom centre title
   Data comes from Supabase via the site's loadState(); it refreshes on a timer,
   and only touches the DOM when a value actually changed (no flicker on stream).
========================================================= */
(function(){
  const params = new URLSearchParams(location.search);
  const tagA = (params.get('a')||'').toUpperCase();
  const tagB = (params.get('b')||'').toUpperCase();
  const theme = params.get('theme')==='neutral' ? 'neutral' : 'mkwc';
  const customTitle = params.get('title');
  const debug = params.has('debug');
  const langParam = (params.get('lang')||'en').toLowerCase();
  window.MKWC_LANG_OVERLAY = ['en','fr','es','ja'].includes(langParam) ? langParam : 'en';
  const decodeList = s => (s||'').split(',').map(x=>x.trim()).filter(Boolean);
  const lineupA = decodeList(params.get('pa'));
  const lineupB = decodeList(params.get('pb'));
  const hasLineup = lineupA.length>0 && lineupB.length>0;
  // The three views live in one overlay; the streamer switches with the tabs. ?mode=
  // sets the initial view (team | lineup | tracks); lineup is only offered if configured.
  const VIEWS = ['team'].concat(hasLineup ? ['lineup'] : []).concat(['tracks']);
  let currentView = params.get('mode');
  if(VIEWS.indexOf(currentView) === -1) currentView = 'team';
  document.getElementById('ov').setAttribute('data-theme', theme);

  // Surface any uncaught error on screen (helps diagnose a stuck "Loading…").
  window.addEventListener('error', e=>{
    const m = document.getElementById('ovMsg');
    if(m && (debug || !window.getTeamStats)) m.textContent = 'Error: ' + (e.message || e.error || 'unknown');
  });
  // If nothing has rendered after 4s, say what's missing instead of hanging on "Loading…".
  setTimeout(()=>{
    const m = document.getElementById('ovMsg');
    if(m && !m.classList.contains('hidden') && m.textContent.indexOf('Error')!==0){
      if(!window.getTeamStats) m.textContent = 'Data not ready (app.js/getTeamStats missing).';
    }
  }, 4000);

  const $ = id => document.getElementById(id);
  function showMsg(m){ $('ovMsg').textContent = m; $('ovMsg').classList.remove('hidden'); $('ovContent').classList.add('hidden'); }
  function showContent(){ $('ovMsg').classList.add('hidden'); $('ovContent').classList.remove('hidden'); }

  // Walk every played match in STATE with its per-race detail, once per render.
  // Each entry: {H, A, scH, scA, tracks, plH:[players], plA:[players], hasDetail}.
  function allDetailedMatches(){
    const S = window.MKWC_STATE ? window.MKWC_STATE() : null; if(!S) return [];
    const pairs = window.pairsFor;
    if(!pairs) return [];
    const out = [];
    function scanGroups(groupsObj){
      if(!groupsObj) return;
      for(const id in groupsObj){
        const g = groupsObj[id]; if(!g) continue;
        pairs(g.slots.length).forEach(([i,j])=>{
          const H=g.slots[i], A=g.slots[j]; if(H==null||A==null) return;
          const key=i+'-'+j, sc=g.scores[key];
          if(!sc || sc[0]===''||sc[1]===''||sc[0]==null||sc[1]==null) return;
          const pl = (g.players && g.players[key]) || {h:[],a:[],tracks:[]};
          out.push(mkMatch(H,A,sc,pl));
        });
      }
    }
    scanGroups(S.quali); scanGroups(S.top); scanGroups(S.mid);
    // Bracket
    if(window.deriveBracketRounds){
      const {rounds, roundScores} = window.deriveBracketRounds();
      const bp = (S.bracket && S.bracket.players) || {};
      for(let r=0;r<4;r++){
        const slots = rounds[r];
        for(let m=0;m<slots.length/2;m++){
          const H=slots[m*2], A=slots[m*2+1]; if(H==null||A==null) continue;
          const sc = roundScores[r][m];
          if(!sc || sc[0]===''||sc[1]===''||sc[0]==null||sc[1]==null) continue;
          const pl = (bp['r'+r] && bp['r'+r][m]) || {h:[],a:[],tracks:[]};
          out.push(mkMatch(H,A,sc,pl));
        }
      }
    }
    return out;
  }
  function mkMatch(H,A,sc,pl){
    const plH = pl.h||[], plA = pl.a||[];
    const raceScore = (arr, r)=>{
      let any=false, tot=0;
      arr.forEach(p=>{ const v=p && p.races && p.races[r]; if(v!==''&&v!=null){ any=true; tot+=Number(v)||0; } });
      return any ? tot : null;
    };
    // A match "has detail" if at least one race has scores on both sides — this is
    // exactly what a forfeit (150–0, entered as a bare score) lacks.
    let hasDetail=false;
    for(let r=0;r<12;r++){ if(raceScore(plH,r)!=null && raceScore(plA,r)!=null){ hasDetail=true; break; } }
    return { H, A, scH:Number(sc[0]), scA:Number(sc[1]), plH, plA, raceScore, hasDetail };
  }

  // The stats shown, top to bottom. `higher` = a higher number is better.
  function statRows(){
    const ts = window.getTeamStats;
    const matches = allDetailedMatches();

    // RACE WIN %: across every race where both teams have a score, how often this team
    // had the higher combined race total. Far more granular than match win %.
    function racePct(tag){
      let won=0, total=0;
      matches.forEach(m=>{
        if(m.H!==tag && m.A!==tag) return;
        if(!m.hasDetail) return;
        const mine = (m.H===tag) ? m.plH : m.plA;
        const opp  = (m.H===tag) ? m.plA : m.plH;
        for(let r=0;r<12;r++){
          const a=m.raceScore(mine,r), b=m.raceScore(opp,r);
          if(a==null || b==null) continue;
          if(a===b) continue; // a tied race counts for neither
          total++; if(a>b) won++;
        }
      });
      return total ? (won/total)*100 : null;
    }
    // POINTS / MATCH excluding forfeits (a 150–0 forfeit isn't a real scoring match
    // and would drag the average down). Only matches with real race detail count.
    function pointsPerMatch(tag){
      let pts=0, games=0;
      matches.forEach(m=>{
        if(!m.hasDetail) return; // skip forfeits / detail-less matches
        if(m.H===tag){ pts+=m.scH; games++; }
        else if(m.A===tag){ pts+=m.scA; games++; }
      });
      return games ? pts/games : null;
    }
    function wins(tag){ const s=ts(tag); return s.played ? s.w : null; }

    // Team clutch = average of its players' 2nd-half − 1st-half race differential
    // (positive = finishes stronger), from getAdvancedStats().
    const adv = window.getAdvancedStats ? window.getAdvancedStats() : {clutch:{}};
    function teamAvgOver(map, tag){
      const vals=[]; for(const k in map){ if(k.indexOf(tag+'|')===0) vals.push(map[k]); }
      return vals.length ? vals.reduce((s,v)=>s+v,0)/vals.length : null;
    }
    function clutch(tag){ return teamAvgOver(adv.clutch||{}, tag); }

    // Late-match sits in a narrow band, so a raw proportion reads ~50/50. Map each value
    // to its position within a realistically achievable team range (not the ±14 extreme).
    const CLU_MIN = -3.0, CLU_MAX = 3.0;
    function posIn(lo, hi, v){
      return Math.max(0, Math.min(1, (v - lo)/(hi - lo)));
    }
    function shareSigned(a, b){
      const pa = posIn(CLU_MIN, CLU_MAX, a), pb = posIn(CLU_MIN, CLU_MAX, b);
      const sum = pa + pb;
      return sum>0 ? (pa/sum)*100 : 50;
    }
    const signed = v => (v>0?'+':'') + v.toFixed(1);

    // Bar share for points/match: a team's per-match score always sits in [252, 732],
    // so basing the split on 0 makes two mid-range scores look nearly equal. Instead
    // map each value to its position within [252, 732], which amplifies real gaps.
    const PF_MIN = 252, PF_MAX = 732;
    function sharePoints(a, b){
      const pos = v => Math.max(0.02, Math.min(1, (v - PF_MIN) / (PF_MAX - PF_MIN)));
      const pa = pos(a), pb = pos(b);
      return (pa/(pa+pb))*100;
    }

    const lang = (window.MKWC_LANG_OVERLAY) || 'en';
    const LBL = {
      en:{race:'Race win %', pf:'Points / match', w:'Matches won', clu:'Late-match'},
      fr:{race:'% Courses gagnées', pf:'Points / match', w:'Matchs gagnés', clu:'Fin de match'},
      es:{race:'% Carreras ganadas', pf:'Puntos / partido', w:'Partidos ganados', clu:'Final de partido'},
      ja:{race:'レース勝率', pf:'ポイント/試合', w:'勝利数', clu:'終盤の伸び'},
    };
    const M = LBL[lang] || LBL.en;
    return [
      { label:M.race, get:racePct,        higher:true, fmt:v=>v==null?'—':Math.round(v)+'%' },
      { label:M.pf,   get:pointsPerMatch, higher:true, fmt:v=>v==null?'—':String(Math.round(v)), share:sharePoints },
      { label:M.w,    get:wins,           higher:true, fmt:v=>v==null?'—':String(v) },
      { label:M.clu,  get:clutch,         higher:true, fmt:v=>v==null?'—':signed(v), share:shareSigned },
    ];
  }

  // Per-player average score for a chosen line-up, plus the SUM of those averages
  // (the total the line-up would post if each player scored their own average).
  // Player avg = their total points / matches played (same basis as the site).
  function lineupData(tag, names){
    const ps = (window.getPlayerStats ? window.getPlayerStats() : {})[tag] || {};
    let sum=0, any=false;
    const players = names.map(n=>{
      const s = ps[n];
      const avg = (s && s.count>0) ? s.total/s.count : null;
      if(avg!=null){ sum+=avg; any=true; }
      return { name:n, avg };
    });
    // Strongest first; players with no data sink to the bottom.
    players.sort((p,q)=> (q.avg==null?-Infinity:q.avg) - (p.avg==null?-Infinity:p.avg));
    return { players, total: any ? sum : null };
  }

  // Per-track comparison: for every track at least one of the two teams has played,
  // each team's average team-score on that track and how many times they played it.
  function tracksData(){
    const rs = window.getRaceStats ? window.getRaceStats() : {teamTrackStats:{}};
    const tName = window.trackName || (x=>x);
    const A = (rs.teamTrackStats||{})[tagA] || {};
    const B = (rs.teamTrackStats||{})[tagB] || {};
    const ids = new Set([...Object.keys(A), ...Object.keys(B)]);
    const rows = [];
    ids.forEach(id=>{
      const a = A[id], b = B[id];
      rows.push({
        id, name: tName(id) || id,
        aAvg: a ? a.total/a.count : null, aN: a ? a.count : 0,
        bAvg: b ? b.total/b.count : null, bN: b ? b.count : 0,
        both: !!(a && b), // played by both teams → directly comparable
      });
    });
    // Most-played first (combined), then by name.
    rows.sort((x,y)=> (y.aN+y.bN) - (x.aN+x.bN) || String(x.name).localeCompare(String(y.name)));
    return rows;
  }

  const esc = s => String(s).replace(/</g,'&lt;');

  // Two columns of players (name + avg score) with each line-up's TOTAL (sum of the
  // player averages) at the bottom. The higher total is highlighted.
  function renderLineupTable(da, db){
    const lang = (window.MKWC_LANG_OVERLAY) || 'en';
    const T = ({en:'Line-up total',fr:'Total de la line-up',es:'Total de la alineación',ja:'ラインアップ合計'})[lang]
              || 'Line-up total';
    const col = (d, side)=>{
      const rows = d.players.map(p=>`
        <div class="lu-player">
          <span class="lu-name">${esc(p.name)}</span>
          <span class="lu-avg">${p.avg==null?'—':Math.round(p.avg)}</span>
        </div>`).join('');
      return `<div class="lu-col ${side}">${rows}</div>`;
    };
    const aWin = da.total!=null && db.total!=null && da.total>db.total;
    const bWin = da.total!=null && db.total!=null && db.total>da.total;
    $('ovRows').innerHTML = `
      <div class="lu-grid">
        ${col(da,'a')}
        ${col(db,'b')}
      </div>
      <div class="lu-total-row">
        <div class="lu-total a ${aWin?'win':''}">${da.total==null?'—':Math.round(da.total)}</div>
        <div class="lu-total-lbl">${T}</div>
        <div class="lu-total b ${bWin?'win':''}">${db.total==null?'—':Math.round(db.total)}</div>
      </div>`;
  }

  // A per-track table: team A avg (× times played) | track name | team B avg (× played).
  // Tracks both teams played come first; those only one team played are hidden behind a
  // "Show more" toggle. The higher average on each track is highlighted.
  function trackRowHTML(r, extraClass){
    const cell = (avg, n, side, win)=>{
      const val = avg==null ? '—' : Math.round(avg);
      const times = n>0 ? `<span class="tk-n">×${n}</span>` : '';
      return `<div class="tk-cell ${side} ${win?'win':''}"><span class="tk-val">${val}</span>${times}</div>`;
    };
    const aWin = r.aAvg!=null && r.bAvg!=null && r.aAvg>r.bAvg;
    const bWin = r.aAvg!=null && r.bAvg!=null && r.bAvg>r.aAvg;
    return `<div class="tk-row ${extraClass||''}">
      ${cell(r.aAvg, r.aN, 'a', aWin)}
      <div class="tk-name">${esc(r.name)}</div>
      ${cell(r.bAvg, r.bN, 'b', bWin)}
    </div>`;
  }
  function renderTracksTable(rows){
    const both = rows.filter(r=>r.both);
    const one  = rows.filter(r=>!r.both);
    const lang = (window.MKWC_LANG_OVERLAY) || 'en';
    const L = ({
      en:{more:'Show more', less:'Show less', empty:'No shared track data yet.'},
      fr:{more:'Voir plus', less:'Voir moins', empty:'Aucun circuit joué par les deux équipes.'},
      es:{more:'Ver más', less:'Ver menos', empty:'Ningún circuito jugado por ambos.'},
      ja:{more:'もっと見る', less:'閉じる', empty:'共通のコースデータなし。'},
    })[lang] || {more:'Show more', less:'Show less', empty:'No shared track data yet.'};

    const open = tracksExpanded; // remembered across auto-refreshes
    const bothHtml = both.length ? both.map(trackRowHTML).join('') : `<div class="ov-msg">${L.empty}</div>`;
    // Extra rows live in the SAME table; they're just toggled row-by-row so the table
    // grows/shrinks in place instead of a second table appearing.
    const oneHtml = one.map(r=>trackRowHTML(r, 'tk-extra-row'+(open?'':' tk-hidden'))).join('');
    const toggle = one.length
      ? `<button class="tk-more" id="tkMore" type="button">${(open?L.less:L.more)} (${one.length})</button>`
      : '';
    // Button goes AFTER the extra rows so it always sits at the bottom: collapsed, the
    // hidden rows take no space so it's right under the shared list; expanded, the rows
    // push it down.
    $('ovRows').innerHTML = `<div class="tk-table">${bothHtml}${oneHtml}${toggle}</div>`;

    const btn = $('tkMore');
    if(btn){
      btn.onclick = ()=>{
        tracksExpanded = !tracksExpanded;
        $('ovRows').querySelectorAll('.tk-extra-row').forEach(el=>{
          el.classList.toggle('tk-hidden', !tracksExpanded);
        });
        btn.textContent = (tracksExpanded ? L.less : L.more) + ' ('+one.length+')';
      };
    }
  }
  let tracksExpanded = false;

  // Build the view tabs (only the views that apply — line-up needs a configured line-up).
  let tabsBuilt = false;
  function renderTabs(){
    const lang = (window.MKWC_LANG_OVERLAY) || 'en';
    const LBL = ({
      en:{team:'Teams', lineup:'Line-up', tracks:'Tracks'},
      fr:{team:'Équipes', lineup:'Line-up', tracks:'Circuits'},
      es:{team:'Equipos', lineup:'Alineación', tracks:'Circuitos'},
      ja:{team:'チーム', lineup:'ラインアップ', tracks:'コース'},
    })[lang] || {team:'Teams', lineup:'Line-up', tracks:'Tracks'};
    const box = $('ovTabs');
    // A single tab needs no tab bar.
    if(VIEWS.length <= 1){ box.style.display='none'; return; }
    if(!tabsBuilt){
      box.innerHTML = VIEWS.map(v=>`<button class="ov-tab" data-view="${v}" type="button">${LBL[v]||v}</button>`).join('');
      box.querySelectorAll('.ov-tab').forEach(btn=>{
        btn.onclick = ()=>{
          if(currentView === btn.dataset.view) return;
          currentView = btn.dataset.view;
          lastSig = null;          // force a redraw of the body
          tracksExpanded = false;  // reset the tracks "show more" on view change
          render();
        };
      });
      tabsBuilt = true;
    }
    box.querySelectorAll('.ov-tab').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.view === currentView);
    });
  }

  let lastSig = null;
  function render(){
    if(!window.getTeamStats){ showMsg('Loading…'); return; }
    if(!tagA || !tagB){ showMsg('Add ?a=FR&b=BRA to the URL (two team tags).'); return; }
    const name = window.teamName || (x=>x);
    const known = window.MKWC_TEAM_TAGS || [];
    if(known.indexOf(tagA)===-1 || known.indexOf(tagB)===-1){
      showMsg('Unknown team tag. Use codes like FR, BRA, JPN…'); return;
    }

    // Common header (flags + matchup title). Names go either side of the fixed "vs".
    function setHeader(){
      $('flagA').src = 'flags/'+tagA+'.png';
      $('flagB').src = 'flags/'+tagB+'.png';
      if(customTitle){
        // Custom title: centre it (put it in the middle cell, blank the sides).
        $('ttlA').textContent = '';
        $('ttlVs').textContent = customTitle;
        $('ttlVs').classList.add('custom');
        $('ttlB').textContent = '';
      } else {
        $('ttlVs').textContent = 'vs';
        $('ttlVs').classList.remove('custom');
        $('ttlA').textContent = name(tagA);
        $('ttlB').textContent = name(tagB);
      }
    }
    setHeader();
    renderTabs();

    // ---------- LINE-UP VIEW: two columns of players + averages, no bars ----------
    if(currentView==='lineup'){
      const da = lineupData(tagA, lineupA), db = lineupData(tagB, lineupB);
      const sig = 'L'+tagA+tagB+theme+lineupA.join(',')+lineupB.join(',')
        + da.players.map(p=>p.avg==null?'-':Math.round(p.avg)).join('|')
        + db.players.map(p=>p.avg==null?'-':Math.round(p.avg)).join('|');
      if(sig === lastSig){ showContent(); return; }
      lastSig = sig;
      renderLineupTable(da, db);
      showContent();
      return;
    }

    // ---------- TRACKS VIEW: per-track average comparison ----------
    if(currentView==='tracks'){
      const rows = tracksData();
      const sig = 'T'+tagA+tagB+theme+rows.map(r=>
        (r.aAvg==null?'-':Math.round(r.aAvg))+'/'+r.aN+':'+(r.bAvg==null?'-':Math.round(r.bAvg))+'/'+r.bN
      ).join('|');
      if(sig === lastSig){ showContent(); return; }
      lastSig = sig;
      renderTracksTable(rows);
      showContent();
      return;
    }

    // ---------- TEAM VIEW: the whole-squad comparison bars ----------
    const rows = statRows();
    // Signature: only rebuild the DOM when a displayed value actually changed.
    const sig = 'S'+tagA+tagB+theme+rows.map(r=>r.fmt(r.get(tagA))+'/'+r.fmt(r.get(tagB))).join('|');
    if(sig === lastSig){ showContent(); return; }
    lastSig = sig;

    const html = rows.map(r=>{
      const va = r.get(tagA), vb = r.get(tagB);
      // Bar split (share of team A, 0–100). A stat can supply its own `share` for
      // "lower is better" or signed stats; otherwise it's the straight proportion.
      let pctA;
      if(va==null || vb==null){
        pctA = 50; // nothing to compare yet
      } else if(typeof r.share === 'function'){
        pctA = r.share(va, vb);
      } else {
        const na = Math.max(0, va), nb = Math.max(0, vb), sum = na + nb;
        pctA = sum>0 ? (na/sum)*100 : 50;
      }
      // Respect the real numbers exactly — a team on 0 gets 0% of the bar.
      pctA = Math.max(0, Math.min(100, pctA));
      let aWin=false, bWin=false;
      if(r.higher!=null && va!=null && vb!=null && va!==vb){
        const aBetter = r.higher ? va>vb : va<vb;
        aWin = aBetter; bWin = !aBetter;
      }
      return `<div class="ov-row">
        <div class="ov-lbl">${r.label}</div>
        <div class="ov-bar-line">
          <div class="ov-val a ${aWin?'win':''}">${r.fmt(va)}</div>
          <div class="ov-bar">
            <div class="ov-bar-a ${pctA<=0?'zero':''}" style="width:${pctA}%"></div>
            <div class="ov-bar-b ${pctA>=100?'zero':''}" style="width:${100-pctA}%"></div>
          </div>
          <div class="ov-val b ${bWin?'win':''}">${r.fmt(vb)}</div>
        </div>
      </div>`;
    }).join('');
    $('ovRows').innerHTML = html;
    showContent();
  }

  // Refresh the underlying data from Supabase, then re-render.
  async function refresh(){
    try{
      if(window.loadState) await window.loadState();
      if(window.migrateAllPlayerData) window.migrateAllPlayerData();
    }catch(e){ /* keep last data */ }
    render();
  }

  // app.js calls this once its first loadState() resolves (overlay mode).
  window.MKWC_ON_READY = function(){
    render();
    setInterval(refresh, 20000); // pull fresh scores every 20s
  };
  // Fallback in case app.js finished before this handler was set.
  if(window.getTeamStats) window.MKWC_ON_READY();
})();
</script>
<script src="assets/app.js"></script>
</body>
</html>
