<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKWC 2026 — Suivi en direct</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"></noscript>
<style>
  :root{
    --orange-1:#F0942F;
    --orange-2:#C1591C;
    --orange-3:#8A3812;
    --panel:#2A1608;
    --panel-2:#341C0C;
    --panel-3:#3E220E;
    --line:rgba(255,235,210,0.14);
    --line-strong:rgba(255,235,210,0.28);
    --cream:#FBEFDA;
    --dim:#D9B996;
    --gold:#FFCE54;
    --green:#3ECF6B;
    --red:#E5484D;
    --blue:#59C7E8;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(circle at 12% -10%, rgba(255,206,84,0.25), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(255,255,255,0.10), transparent 35%),
      repeating-linear-gradient(115deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 6px),
      linear-gradient(160deg, var(--orange-1) 0%, var(--orange-2) 45%, var(--orange-3) 100%);
    background-attachment:fixed;
  }
  h1,h2,h3,.display{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .outline{
    color:#fff;
    -webkit-text-stroke:1.5px #4a1f04;
    text-stroke:1.5px #4a1f04;
    text-shadow:0 3px 0 rgba(0,0,0,0.25);
  }

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:30;
    background:rgba(20,10,3,0.72);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-strong);
  }
  .header-inner{
    max-width:1220px; margin:0 auto; padding:14px 20px;
    display:flex; align-items:center; gap:18px; flex-wrap:nowrap;
    overflow-x:auto; scrollbar-width:none;
  }
  .header-inner::-webkit-scrollbar{display:none;}
  .brand{display:flex; align-items:center; gap:10px; flex-shrink:0;}
  .brand-mark{
    width:104px;height:auto;flex-shrink:0;
  }
  .brand-text{line-height:1.05;}
  .brand-text .t1{font-size:20px;}
  .brand-text .t1 span{color:var(--gold);}
  .brand-text .t2{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.12em;}
  nav{display:flex;gap:6px;margin-left:auto;flex-wrap:nowrap;flex-shrink:0;}
  .navbtn{
    background:transparent;border:1px solid transparent;color:var(--dim);
    padding:8px 14px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;
    font-size:15px;letter-spacing:0.03em;cursor:pointer;text-transform:uppercase;white-space:nowrap;flex-shrink:0;
  }
  .navbtn:hover{color:#fff;}
  .navbtn.active{background:var(--gold);color:#3a2100;border-color:var(--gold);}
  .adminbtn{
    background:transparent;border:1px solid transparent;color:var(--dim);
    padding:6px 9px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'JetBrains Mono',monospace;
    white-space:nowrap;flex-shrink:0;opacity:0.35;transition:opacity .15s, background .15s, border-color .15s;
  }
  .adminbtn:hover{opacity:1;background:var(--panel-2);border-color:var(--line-strong);}
  .adminbtn.on{color:#fff;background:var(--red);border-color:var(--red);opacity:1;}

  .lang-switch{display:flex;gap:4px;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:8px;padding:3px;flex-shrink:0;}
  .lang-switch button{
    background:transparent;border:none;color:var(--dim);padding:5px 9px;border-radius:6px;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.03em;
  }
  .lang-switch button:hover{color:var(--cream);}
  .lang-switch button.active{background:var(--gold);color:#3a2100;}

  /* ---------- hero ---------- */
  .hero{
    width:100%;padding:36px 32px 14px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:nowrap;
    box-sizing:border-box;
  }
  .hero-titles{min-width:0;flex:1 1 auto;}
  .hero h1{font-size:clamp(20px,4vw,46px);overflow-wrap:break-word;}
  .hero .sub{color:var(--panel);background:var(--cream);display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:10px;}
  .hero .dates{
    flex:0 0 auto;white-space:nowrap;
    font-family:'JetBrains Mono',monospace;font-size:13px;color:#3a2100;
    border:2px solid #3a2100;padding:8px 14px;border-radius:8px;background:var(--gold);
    font-weight:700;
  }

  main{max-width:1220px;margin:0 auto;padding:20px;width:100%;flex:1;box-sizing:border-box;}

  /* pot legend strip — signature element (echoes the seed-pot color blocks) */

  section{display:none;}
  section.active{display:block;}

  .stage-block{margin-bottom:38px;}
  .stage-head{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;flex-wrap:wrap;}
  .stage-head h2{font-size:24px;}
  .stage-head .stage-date{font-size:12px;color:#3a2100;background:var(--gold);padding:3px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-weight:700;}
  .stage-note{font-size:13px;color:var(--dim);margin-bottom:16px;}
  .stage-subhead{font-size:15px;font-weight:700;color:var(--gold);font-family:'Rajdhani',sans-serif;margin:6px 0 4px;text-transform:uppercase;letter-spacing:0.04em;}
  .tier-badge{
    font-family:'JetBrains Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:0.06em;color:var(--gold);
    margin-bottom:4px;
  }

  .groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
  .group-card{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line-strong);border-radius:var(--radius);
    padding:16px;box-shadow:0 6px 18px rgba(0,0,0,0.25);
    /* No `contain:content` here: its paint containment would clip the column
       tooltips at the card's edges, making them unreadable. */
  }
  .group-card h3{font-size:17px;color:var(--gold);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .group-card h3 .qual-tag{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-transform:none;letter-spacing:0;}

  .phase-banner{
    padding:14px 20px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;
    background:var(--panel-2);border:1px solid var(--line-strong);color:var(--cream);
  }
  .phase-banner.phase-playin, .phase-banner.phase-group, .phase-banner.phase-bracket{
    background:rgba(229,72,77,0.12);border-color:var(--red);color:var(--cream);
  }
  .phase-banner.phase-after{background:rgba(255,206,84,0.12);border-color:var(--gold);}
  .phase-countdown{
    font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--gold);font-weight:700;
    margin-top:8px;letter-spacing:0.03em;
  }
  .live-now-block{margin-top:18px;}
  .live-now-title{
    font-size:13px;color:var(--red);text-transform:uppercase;letter-spacing:0.08em;
    font-family:'JetBrains Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:7px;
  }
  .live-now-title::before{
    content:'';width:8px;height:8px;border-radius:50%;background:var(--red);
    box-shadow:0 0 0 0 rgba(229,72,77,0.6); animation:live-pulse 1.6s infinite;
  }
  @keyframes live-pulse{
    0%{box-shadow:0 0 0 0 rgba(229,72,77,0.6);}
    70%{box-shadow:0 0 0 7px rgba(229,72,77,0);}
    100%{box-shadow:0 0 0 0 rgba(229,72,77,0);}
  }

  .format-card{
    background:linear-gradient(160deg, #4a2a12, #5c3618);
    border:1px solid rgba(255,206,84,0.35);
  }
  .format-card .stage-note{color:var(--cream);opacity:0.92;}
  .explore-card{cursor:pointer;transition:border-color .15s, transform .15s;}
  .explore-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .helptext a{color:var(--gold);text-decoration:underline;text-underline-offset:2px;}
  .helptext a:hover{color:var(--cream);}
  .explore-card h3{margin-bottom:0;justify-content:flex-start;gap:8px;}

  table.standings{width:100%;border-collapse:collapse;font-size:13px;}
  table.standings th{
    text-align:left;color:var(--dim);font-weight:600;font-size:11px;
    text-transform:uppercase;letter-spacing:0.05em;padding:4px 6px;border-bottom:1px solid var(--line);
  }
  table.standings th.num{text-align:center;letter-spacing:normal;}
  table.standings td{padding:6px 6px;border-bottom:1px solid rgba(255,255,255,0.04);}
  table.standings tr.qualified td:first-child{box-shadow:inset 3px 0 0 var(--green);}
  /* Points column: the headline number of the standings, echoing the official sheet. */
  table.standings td.pts-col{color:var(--gold);font-weight:700;font-family:'JetBrains Mono',monospace;}
  table.standings th.pts-col .col-help,table.standings th.pts-col{color:var(--gold);}
  .pos{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:11px;width:26px;}
  .pos.p1{color:var(--dim);}
  .teamcell{display:flex;align-items:center;gap:8px;}
  .teamcell:hover .teamname{text-decoration:underline;}
  .flag{width:27px;height:18px;border-radius:4px;flex-shrink:0;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,0.35) inset, 0 1px 3px rgba(0,0,0,0.4);}
  .flag svg{display:block;width:100%;height:100%;}
  .flag.lg{width:44px;height:29px;border-radius:5px;}
  .flag.sm{width:20px;height:13px;border-radius:3px;}
  .tbd{
    width:27px;height:18px;border-radius:4px;flex-shrink:0;border:1px dashed var(--dim);
  }
  .num{font-family:'JetBrains Mono',monospace;text-align:center;}
  .teamname{white-space:nowrap;}
  .tbdname{color:var(--dim);font-style:italic;font-size:12px;}

  /* bracket */
  .bracket-wrap{overflow-x:auto;padding-bottom:10px;}
  .bracket{display:flex;gap:26px;min-width:780px;align-items:stretch;}
  .round{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:195px;position:relative;padding-top:54px;box-sizing:border-box;}
  .round-title{position:absolute;top:0;left:0;right:0;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cream);text-align:center;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-weight:700;}
  .round-title span{opacity:.65;font-weight:500;}
  .match{
    background:var(--panel-2);border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;
  }
  .mrow{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;font-size:13px;gap:6px;}
  .mrow:first-child{border-bottom:1px solid var(--line);}
  .mrow.winner{background:rgba(62,207,107,0.14);}
  .mrow .score{font-family:'JetBrains Mono',monospace;color:var(--dim);font-weight:700;}
  .mrow.winner .score{color:var(--green);}
  .mrow > span:first-child{display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .team-link{cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
  .team-plain{display:inline-flex;align-items:center;gap:8px;}
  .stage-link{cursor:pointer;}
  .stage-link:hover{color:var(--cream);text-decoration:underline;}
  .team-link:hover .teamname{text-decoration:underline;color:var(--gold);}

  /* calendar */
  .cal-list{display:flex;flex-direction:column;gap:10px;}
  .cal-item{
    background:var(--panel-2);border:1px solid var(--line-strong);border-radius:var(--radius);
    padding:12px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .match-card{cursor:pointer;transition:border-color .15s, box-shadow .15s;}
  .match-card:hover{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
  .cal-stage{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.06em;font-family:'JetBrains Mono',monospace;min-width:160px;white-space:nowrap;}
  .cal-teams{display:flex;align-items:center;gap:10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;flex:1;justify-content:flex-end;}
  .cal-teams-opp{justify-content:flex-start;}
  .cal-team-side{display:flex;align-items:center;gap:10px;}
  .cal-score{font-family:'JetBrains Mono',monospace;color:var(--dim);width:88px;flex-shrink:0;text-align:center;white-space:nowrap;}
  .score-win{color:var(--gold);font-weight:700;}
  .forfeit-badge{
    display:inline-block;margin-left:8px;padding:1px 7px;border-radius:10px;font-size:9px;
    font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;
    background:rgba(229,72,77,0.18);color:var(--red);border:1px solid var(--red);vertical-align:middle;
  }
  .forfeit-note{
    margin-bottom:16px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;
    background:rgba(229,72,77,0.12);border:1px solid var(--red);color:var(--cream);
  }
  .best-race-banner{margin-bottom:16px;font-size:14px;color:var(--cream);}
  .twitch-live-banner{
    display:flex;align-items:center;gap:8px;margin-bottom:18px;padding:12px 16px;
    background:rgba(145,70,255,0.14);border:1px solid #9146FF;border-radius:10px;
    color:var(--cream);font-weight:700;text-decoration:none;font-size:14px;
    transition:background .15s;
  }
  .twitch-live-banner:hover{background:rgba(145,70,255,0.24);}
  .twitch-live-banner--nolink{
    background:rgba(229,72,77,0.12);border-color:var(--red);cursor:default;
  }
  .twitch-live-banner--nolink:hover{background:rgba(229,72,77,0.12);}
  .sub-tag{color:var(--dim);font-size:11px;font-weight:400;}
  .score-lose{color:var(--dim);}
  .cal-score.done{color:var(--cream);}
  .cal-date{font-size:12px;color:var(--dim);min-width:150px;flex-shrink:0;text-align:right;white-space:nowrap;}
  .cal-date.emphasize{color:var(--gold);font-weight:700;font-size:13px;}

  /* teams grid */
  .flag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
  .flag-grid-item{
    position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:3/2;
    box-shadow:0 6px 16px rgba(0,0,0,0.3);border:1px solid var(--line-strong);
  }
  .flag-grid-item .fgi-flag{width:100%;height:100%;transition:filter .18s;}
  .flag-grid-item .fgi-flag svg, .flag-grid-item .fgi-flag img{width:100%;height:100%;display:block;}
  .flag-grid-item:hover .fgi-flag{filter:brightness(0.4);}
  .fgi-overlay{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:8px;opacity:0;transition:opacity .18s;background:rgba(0,0,0,0.15);
  }
  .flag-grid-item:hover .fgi-overlay{opacity:1;}
  .fgi-overlay span{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.8);}

  .team-detail-page{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line-strong);border-radius:var(--radius);padding:22px;margin-top:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .tdp-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
  .match-detail-row{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;padding:20px 0;}
  .match-detail-team{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:160px;text-align:center;}
  .match-detail-team .team-link{flex-direction:column;gap:10px;}
  .match-detail-team .teamname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;}
  /* Score sits next to its own team so it's always clear who scored what. Winning
     score is gold, losing score dimmed — the team NAME stays neutral. */
  .mdt-score{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;line-height:1;}
  .mdt-score.score-win{color:var(--gold);}
  .mdt-score.score-lose{color:var(--dim);}
  .match-detail-mid{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--dim);text-align:center;}
  .match-detail-mid .md-vs{text-transform:uppercase;font-size:20px;}
  .match-detail-mid .md-upcoming-date{font-size:16px;color:var(--gold);font-weight:700;font-family:'Inter',sans-serif;margin-top:6px;text-transform:none;}
  .match-detail-players-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;}
  .race-chart-wrap{margin-top:28px;}
  .race-chart-title{font-size:15px;color:var(--gold);margin-bottom:10px;}
  .race-chart-legend{display:flex;gap:18px;margin-top:8px;font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
  .race-chart-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;}
  .mdp-col{display:flex;flex-direction:column;gap:3px;}
  .tdp-header h2{font-size:26px;}
  .stat-strip{display:flex;gap:14px;flex-wrap:wrap;margin:12px 0;font-family:'JetBrains Mono',monospace;font-size:12px;}
  .stat-strip .s{background:var(--panel-3);padding:6px 10px;border-radius:6px;border:1px solid var(--line);}
  .stat-strip .s b{color:var(--gold);font-size:14px;}
  .match-progress-label{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--dim);margin-bottom:8px;}
  .match-progress-label b{color:var(--gold);font-size:16px;}
  .match-progress-bar{width:100%;height:12px;background:var(--panel-3);border-radius:7px;overflow:hidden;border:1px solid var(--line-strong);}
  .match-progress-fill{height:100%;background:linear-gradient(90deg,#FFCE54,#FF9F43);border-radius:7px;transition:width .5s ease;}
  .roster-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
  .roster-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .role-badge{font-size:9px;font-family:'JetBrains Mono',monospace;padding:1px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:0.04em;}
  .role-badge.C{background:var(--gold);color:#3a2100;}
  .role-badge.R{background:var(--blue);color:#052b33;}
  .nat-badge{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;position:relative;display:inline-block;cursor:default;}
  .nat-badge::after{
    content:attr(data-tooltip);
    position:absolute; bottom:calc(100% + 6px); left:0; transform:none;
    background:#1a1005; color:var(--cream); border:1px solid var(--line-strong);
    padding:4px 8px; border-radius:6px; font-size:11px; font-family:'Inter',sans-serif;
    white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .1s;
    box-shadow:0 4px 10px rgba(0,0,0,0.35); z-index:20;
  }
  .nat-badge:hover::after{opacity:1;}
  .col-help{position:relative;display:inline-block;cursor:help;border-bottom:1px dotted var(--dim);}
  /* Tooltip opens DOWNWARD (into the table body) on purpose: the scrollable
     .stats-table-wrap clips anything above the header row, so an upward bubble
     would be cut off. */
  .col-help::after{
    content:attr(data-tooltip);
    position:absolute; top:calc(100% + 8px); left:50%; transform:translateX(-50%);
    width:max-content; max-width:230px; white-space:normal; text-align:left;
    background:#1a1005; color:var(--cream); border:1px solid var(--line-strong);
    padding:7px 10px; border-radius:8px; font-size:11px; line-height:1.35;
    font-family:'Inter',sans-serif; font-weight:400; letter-spacing:0; text-transform:none;
    opacity:0; pointer-events:none; transition:opacity .12s;
    box-shadow:0 6px 16px rgba(0,0,0,0.45); z-index:40;
  }
  .col-help:hover::after{opacity:1;}
  /* Edge columns: anchor the bubble to the cell's right edge so it can't spill
     off the right side of the (horizontally-clipping) table wrapper. */
  .stats-table thead th:last-child .col-help::after,
  .stats-table thead th:nth-last-child(2) .col-help::after{
    left:auto; right:0; transform:none;
  }
  /* Group standings live in narrow cards (~300px), so a centered 230px bubble would
     always spill. Keep the bubble narrower here and anchor each column's bubble to
     the side it's nearest: left-half columns to the left, right-half to the right. */
  table.standings .col-help::after{max-width:200px;}
  table.standings thead th:nth-child(3) .col-help::after,
  table.standings thead th:nth-child(4) .col-help::after{
    left:0; right:auto; transform:none;
  }
  table.standings thead th:nth-child(5) .col-help::after,
  table.standings thead th:nth-child(6) .col-help::after,
  table.standings thead th:nth-child(7) .col-help::after,
  table.standings thead th:nth-child(8) .col-help::after{
    left:auto; right:0; transform:none;
  }

  /* players view */
  .player-search{
    width:100%;padding:12px 14px;background:var(--panel-2);border:1px solid var(--line-strong);
    color:var(--cream);border-radius:10px;font-size:14px;margin-bottom:18px;
  }
  .player-search:focus{outline:none;border-color:var(--gold);}
  .players-more-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:14px;}
  .players-more-wrap .chip{padding:9px 20px;font-size:14px;}
  .players-empty-search{color:var(--dim);font-size:14px;}
  .stats-table-wrap{
    background:var(--panel-2);border:1px solid var(--line-strong);border-radius:var(--radius);
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    overflow-x:auto;
  }
  .stats-table{width:100%;border-collapse:collapse;font-size:13px;}
  .stats-table thead th{
    text-align:left;color:var(--dim);font-weight:600;font-size:11px;
    text-transform:uppercase;letter-spacing:0.05em;padding:10px 12px;
    border-bottom:1px solid var(--line-strong);background:var(--panel-3);
  }
  .stats-table thead th.num{text-align:center;letter-spacing:normal;}
  .stats-table thead tr:first-child th:first-child{border-top-left-radius:var(--radius);}
  .stats-table thead tr:first-child th:last-child{border-top-right-radius:var(--radius);}
  .stats-table tbody tr:last-child td:first-child{border-bottom-left-radius:var(--radius);}
  .stats-table tbody tr:last-child td:last-child{border-bottom-right-radius:var(--radius);}
  .stats-table tbody tr:nth-child(even){background:rgba(255,255,255,0.02);}
  .stats-table tbody tr:hover{background:rgba(255,206,84,0.06);}
  .stats-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);}
  .stats-table td.num{text-align:center;font-family:'JetBrains Mono',monospace;color:var(--cream);}
  .stats-table td.num.highlight{color:var(--gold);font-weight:700;}
  .stats-table .lp{font-family:'JetBrains Mono',monospace;color:var(--dim);width:24px;text-align:center;}
  .stats-table .lp.top1{color:var(--gold);font-weight:700;}
  .stats-table .lname{font-weight:600;}
  .stats-table .lteam{font-size:12.5px;color:var(--dim);}
  /* Only the player's name is clickable now, not the whole row. */
  .player-name-link{cursor:pointer;}
  .player-name-link:hover{color:var(--gold);text-decoration:underline;text-underline-offset:2px;}
  .stats-table .teamcell{display:flex;align-items:center;gap:8px;}

  /* admin */
  .admin-gate{
    max-width:380px;margin:60px auto;background:var(--panel-2);border:1px solid var(--line-strong);
    border-radius:var(--radius);padding:26px;text-align:center;
  }
  .admin-gate input{
    width:100%;padding:10px;margin:14px 0;background:var(--panel-3);border:1px solid var(--line);
    color:var(--cream);border-radius:8px;font-family:'JetBrains Mono',monospace;text-align:center;
  }
  .admin-gate p{color:var(--dim);font-size:13px;}
  button.primary{
    background:var(--gold);color:#3a2100;border:none;padding:10px 18px;border-radius:8px;
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.03em;
    cursor:pointer;text-transform:uppercase;
  }
  button.primary:hover{filter:brightness(1.08);}
  button.ghost{
    background:transparent;border:1px solid var(--line-strong);color:var(--dim);
    padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;
  }
  button.back-btn{
    background:var(--gold);color:#3a2100;border:none;
    padding:10px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:'Rajdhani',sans-serif;letter-spacing:0.02em;text-transform:uppercase;
    margin-bottom:18px;box-shadow:0 3px 10px rgba(0,0,0,0.3);
  }
  button.back-btn:hover{filter:brightness(1.08);}
  .admin-panel{display:flex;flex-direction:column;gap:26px;}
  .admin-select-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    background:var(--panel-2);border:1px solid var(--line-strong);color:var(--dim);
    padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;
  }
  .chip.active{background:var(--gold);color:#3a2100;border-color:var(--gold);}
  .admin-match-row{
    display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel-2);
    border:1px solid var(--line-strong);border-radius:8px;margin-bottom:8px;flex-wrap:wrap;
  }
  .admin-match-row .team-select{flex:1;min-width:150px;}
  .admin-match-full{
    padding:12px;background:var(--panel-2);border:1px solid var(--line-strong);
    border-radius:8px;margin-bottom:12px;
  }
  .amr-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .amr-header .team-select{flex:1;min-width:120px;}
  .admin-stream-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .admin-stream-label{font-size:12px;color:var(--dim);white-space:nowrap;}
  .admin-stream-input{
    flex:1;min-width:200px;padding:7px 10px;border-radius:6px;
    background:var(--panel-3);border:1px solid var(--line-strong);color:var(--cream);
    font-family:'JetBrains Mono',monospace;font-size:12px;
  }
  .admin-stream-input:focus{outline:none;border-color:var(--gold);}
  .admin-forfeit-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .ff-btn{
    padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;
    background:var(--panel-3);border:1px solid var(--line-strong);color:var(--cream);
  }
  .ff-btn:hover{border-color:var(--gold);}
  .ff-btn.ff-active{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;}
  .ff-btn.ff-clear{background:transparent;color:var(--dim);}
  .ff-hidden{display:none;}
  .amr-total{
    font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold);
    background:var(--panel-3);padding:6px 12px;border-radius:6px;min-width:44px;text-align:center;
  }
  .amr-players{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .amr-side{display:flex;flex-direction:column;gap:5px;}
  .amr-player-row{display:flex;gap:6px;}
  .amr-player-row select{flex:1;min-width:0;}
  .amr-player-row .score-input{width:64px;flex-shrink:0;}
  .amr-race-wrap{overflow-x:auto;margin-top:10px;}
  .amr-race-table{border-collapse:collapse;font-size:12px;white-space:nowrap;}
  .amr-race-table th,.amr-race-table td{padding:3px 4px;text-align:center;}
  .amr-race-table thead th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;}
  .amr-race-name{text-align:left !important;min-width:150px;}
  .amr-race-table input.race-input{width:38px;padding:4px 2px;text-align:center;font-size:12px;}
  .amr-race-table select{max-width:150px;font-size:12px;padding:4px 6px;}
  .amr-race-total{color:var(--gold);font-weight:700;min-width:34px;}
  .amr-race-table input.race-total-input{width:48px;padding:4px 2px;text-align:center;font-size:12px;font-weight:700;color:var(--gold);}
  /* When the total is auto-computed from the 12 races it's read-only and dimmed to
     signal "type races to change this", vs. an editable hand-typed total. */
  .amr-race-table input.race-total-input.is-auto{opacity:0.7;cursor:not-allowed;}
  .amr-race-table input.race-total-input:not(.is-auto){border-color:var(--gold);background:rgba(255,206,84,0.08);}
  .amr-track-table{margin-bottom:2px;}
  .amr-track-select{width:110px;font-size:11px;padding:4px 3px;}
  select, .score-input{
    background:var(--panel-3);border:1px solid var(--line-strong);color:var(--cream);
    padding:7px 9px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;
  }
  .score-input{width:56px;text-align:center;font-family:'JetBrains Mono',monospace;}
  .vs{color:var(--dim);font-size:12px;font-family:'JetBrains Mono',monospace;}
  .save-note{font-size:12px;color:var(--green);margin-left:8px;opacity:0;transition:opacity 0.3s;}
  .save-note.show{opacity:1;}
  .helptext{font-size:12px;color:var(--dim);margin-bottom:10px;}
  .thanks-text{font-size:15px;font-weight:600;color:var(--cream);margin-top:32px;line-height:1.5;}
  footer{text-align:center;color:var(--dim);font-size:12px;padding:40px 20px;}

  /* flag editor */
  .editor-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  @media (max-width:820px){ .editor-layout{grid-template-columns:1fr;} }

  /* ---------- mobile adjustments ---------- */
  @media (max-width:680px){
    .header-inner{padding:10px 14px;gap:10px;}
    .brand-mark{width:64px;}
    .brand-text .t1{font-size:15px;}
    .brand-text .t2{font-size:9px;}
    .navbtn{padding:7px 10px;font-size:13px;}
    .lang-switch button{padding:4px 7px;font-size:12px;}
    .adminbtn{padding:5px 7px;font-size:12px;}

    .hero{padding:20px 16px 12px;flex-wrap:wrap;gap:10px;}
    .hero .dates{font-size:11px;padding:6px 10px;}

    main{padding:14px;}

    .groups-grid{grid-template-columns:1fr;}
    .flag-grid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}

    /* Mobile match cards: a clean, regular 2-row layout.
       Row 1 = stage (left) + date (right). Row 2 = the teams and score.
       Works for both card shapes: calendar cards (teams block + score) and
       team-page cards (own team | score | opponent). */
    .cal-item{
      padding:10px 12px;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px 10px;
    }
    .cal-stage{grid-column:1;min-width:0;font-size:10px;white-space:normal;}
    .cal-date{grid-column:2;min-width:0;text-align:right;font-size:11px;white-space:nowrap;justify-self:end;}
    .cal-date.emphasize{font-size:12px;}
    .cal-teams{grid-column:1 / -1;font-size:14px;justify-content:center;flex-wrap:wrap;}
    .cal-score{grid-column:1 / -1;width:auto;justify-self:center;text-align:center;font-size:15px;}
    .cal-item:has(.cal-teams-opp){grid-template-columns:1fr auto 1fr;}
    .cal-item:has(.cal-teams-opp) .cal-stage{grid-column:1 / -1;}
    .cal-item:has(.cal-teams-opp) .cal-date{grid-column:1 / -1;text-align:left;justify-self:start;}
    .cal-item:has(.cal-teams-opp) .cal-teams{grid-column:1;justify-content:flex-end;}
    .cal-item:has(.cal-teams-opp) .cal-score{grid-column:2;width:auto;}
    .cal-item:has(.cal-teams-opp) .cal-teams-opp{grid-column:3;justify-content:flex-start;}

    /* On phones, stack each team as its own full-width row with the score pinned to
       the right, so it's obvious which score belongs to which team. */
    .match-detail-row{flex-direction:column;gap:8px;padding:10px 0;}
    .match-detail-team{
      min-width:0;width:100%;flex-direction:row;justify-content:space-between;
      align-items:center;text-align:left;gap:12px;
      background:var(--panel-2);border:1px solid var(--line-strong);border-radius:10px;padding:10px 14px;
    }
    .match-detail-team .team-link{flex-direction:row;gap:10px;}
    .match-detail-team .teamname{font-size:17px;}
    .mdt-score{font-size:26px;}
    .match-detail-row.is-played .match-detail-mid{display:none;}
    .match-detail-mid{font-size:14px;padding:2px 0;}
    .match-detail-players-row{grid-template-columns:1fr;gap:16px;}

    .amr-players{grid-template-columns:1fr;}
    .amr-header{font-size:14px;}
    .admin-match-full{padding:10px;}

    .admin-select-row{gap:6px;}
    .admin-select-row .chip{padding:6px 9px;font-size:12px;}

    .stats-table{font-size:12px;}
    .stats-table td,.stats-table thead th{padding:7px 8px;}
  }
  .editor-preview-box{
    background:var(--panel-2);border:1px solid var(--line-strong);border-radius:var(--radius);
    padding:18px;display:flex;flex-direction:column;align-items:center;gap:12px;position:sticky;top:80px;
  }
  .editor-canvas{width:100%;max-width:420px;aspect-ratio:3/2;border-radius:8px;overflow:hidden;box-shadow:0 0 0 2px var(--line-strong), 0 10px 24px rgba(0,0,0,0.35);position:relative;}
  .editor-canvas svg{width:100%;height:100%;display:block;}
  .editor-grid-overlay{position:absolute;inset:0;pointer-events:none;opacity:0.35;}
  .editor-error{color:var(--red);font-size:12px;font-family:'JetBrains Mono',monospace;min-height:16px;}
  .editor-toolbar{display:flex;flex-wrap:wrap;gap:6px;}
  .editor-toolbar button{
    background:var(--panel-3);border:1px solid var(--line-strong);color:var(--cream);
    padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;
  }
  .editor-toolbar button:hover{border-color:var(--gold);color:var(--gold);}
  .editor-textarea{
    width:100%;min-height:320px;background:var(--panel-3);border:1px solid var(--line-strong);
    color:var(--cream);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12.5px;
    line-height:1.6;resize:vertical;tab-size:2;
  }
  .editor-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .editor-select-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .editor-select-row select{min-width:220px;padding:8px 10px;}
  .editor-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
  .editor-badge.custom{background:var(--green);color:#062;}
  .editor-badge.default{background:var(--panel-3);color:var(--dim);border:1px solid var(--line);}
  .editor-hint{font-size:12px;color:var(--dim);line-height:1.6;}
  .editor-hint code{background:var(--panel-3);padding:1px 5px;border-radius:4px;}
</style>
</head>

function __trace(label){ console.log(`[perf] ${label} — ${(performance.now()-__T0).toFixed(0)} ms depuis le début du script`); }

  new PerformanceObserver((list)=>{
    list.getEntries().forEach(e=>{
      console.log(`[longtask] ${e.duration.toFixed(0)} ms, démarré à ${(e.startTime-__T0).toFixed(0)} ms`);

  // Never slice the raw ISO string for this — it's written in Belgium's timezone,
  // so slicing it would give Belgium's calendar date, not the visitor's. Building a
  // real Date object and reading its LOCAL year/month/day gives the calendar day as
  // that specific visitor's browser sees it, which is what determines which day's
  // section a match belongs in for them.
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatScheduledLocal(iso){
  // The locale (which language the date is written in) follows the site's own
  // language switcher. The timezone itself is still the visitor's own — that part
  // is automatic and untouched, since we never pass an explicit timeZone option.
  const d = new Date(iso);
  let out = d.toLocaleString(localeForLang(), { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

  // plainly instead. The other languages here already use an unambiguous 24h clock.
  if(LANG==='en') out = out.replace('12:00 AM', 'Midnight').replace('12:00 PM', 'Noon');

}

let STATE = {
  quali:{}, mid:{}, top:{},
  bracket:{ slots:Array(16).fill(null), scores:{r0:{},r1:{},r2:{},r3:{}}, players:{r0:{},r1:{},r2:{},r3:{}} }
};

function defaultState(){
  const s = {quali:{},mid:{},top:{},streams:{},forfeits:{},bracket:{slots:Array(16).fill(null),scores:{r0:{},r1:{},r2:{},r3:{}},players:{r0:{},r1:{},r2:{},r3:{}}}};
  for(const g in QUALI_GROUPS) s.quali[g] = {slots:[...QUALI_GROUPS[g].teams], scores:{}, players:{}};
  for(const g in MID_GROUPS) s.mid[g] = {slots:[...MID_GROUPS[g].fixed, null, null], scores:{}, players:{}};
  for(const g in TOP_GROUPS) s.top[g] = {slots:[...TOP_GROUPS[g].teams], scores:{}, players:{}};
  return s;
}
function emptyPlayerSlots(){ return [0,1,2,3,4,5].map(()=>({n:'', races: Array(12).fill('')})); }
// The live-stream link is stored flat in STATE.streams, keyed by matchRef
// ('g|<section>|<group>|<i>|<j>' for groups, 'b|<round>|<index>' for bracket).
function streamRefFor(section, groupOrRound, keyOrIndex){
  if(section==='bracket') return `b|${groupOrRound}|${keyOrIndex}`;
  // keyOrIndex is 'i-j' → 'i|j'
  return `g|${section}|${groupOrRound}|${keyOrIndex.replace('-','|')}`;
}
function streamInputRowHTML(ref, disabled){
  const val = (STATE.streams && STATE.streams[ref]) || '';
  return `<div class="admin-stream-row">
    <label class="admin-stream-label">🔴 Lien du stream (live)</label>
    <input type="text" class="admin-stream-input" data-stream="${ref}" value="${val.replace(/"/g,'&quot;')}"
      placeholder="https://www.twitch.tv/... (laisser vide si aucun stream)" ${disabled}>
  </div>`;
}
// A forfeit is stored in STATE.forfeits[matchRef] as the LOSING side, 'H' or 'A'.
// The forfeiting team loses 0-150; nothing is played, so no individual stats.
function forfeitSideFor(ref){ const v = STATE.forfeits && STATE.forfeits[ref]; return (v==='H'||v==='A') ? v : null; }
// Immediately reflect a forfeit (or its removal) in the match score, so the change
// shows without waiting for the next full save/derive pass. side: 'H'|'A'|null.
function applyForfeitToScore(ref, side){
  const parts = ref.split('|');
  let scores = null, players = null, key = null;
  if(parts[0]==='g'){
    const groupsObj = parts[1]==='quali'?STATE.quali:(parts[1]==='top'?STATE.top:STATE.mid);
    const g = groupsObj && groupsObj[parts[2]];
    if(!g) return;
    scores = g.scores; players = g.players; key = parts[3]+'-'+parts[4];
  } else if(parts[0]==='b'){
    const rk = 'r'+parts[1];
    if(!STATE.bracket.scores[rk]) STATE.bracket.scores[rk] = {};
    if(!STATE.bracket.players[rk]) STATE.bracket.players[rk] = {};
    scores = STATE.bracket.scores[rk]; players = STATE.bracket.players[rk]; key = parts[2];
  }
  if(!scores) return;
  if(side==='H') scores[key] = ['0','150'];
  else if(side==='A') scores[key] = ['150','0'];
  else { scores[key] = ['','']; return; } // forfeit cleared: reset; a later save re-derives from races
  // A forfeited match wasn't played, so it must produce no individual stats: clear
  // any players that had been entered for it (the score stays the forced 150-0).
  if(players) delete players[key];
}
function forfeitRowHTML(ref, teamH, teamA, disabled){
  const side = forfeitSideFor(ref);
  const nameH = teamH ? teamName(teamH) : '—';
  const nameA = teamA ? teamName(teamA) : '—';
  const dis = (teamH==null || teamA==null) ? 'disabled' : (disabled||'');
  return `<div class="admin-forfeit-row" data-forfeit-ref="${ref}">
    <label class="admin-stream-label">🏳️ Forfait</label>
    <button type="button" class="ff-btn ${side==='H'?'ff-active':''}" data-forfeit-set="H" ${dis}>${nameH} déclare forfait</button>
    <button type="button" class="ff-btn ${side==='A'?'ff-active':''}" data-forfeit-set="A" ${dis}>${nameA} déclare forfait</button>
    <button type="button" class="ff-btn ff-clear ${side?'':'ff-hidden'}" data-forfeit-set="">✖ Annuler le forfait</button>
  </div>`;
}
function playerTotal(p){ return (p.races||[]).reduce((sum,v)=> sum + (v!=='' && v!=null ? (Number(v)||0) : 0), 0); }
function playerRacesFilled(p){ return (p.races||[]).some(v=>v!=='' && v!=null); }
// A player's score can be entered two ways: either the 12 individual races, or just a
// hand-typed match total (p.total) when the detail isn't encoded yet. Individual races,
// once present, always win over the typed total.
function playerHasTypedTotal(p){ return p && p.total!=='' && p.total!=null && !isNaN(Number(p.total)); }
function effectivePlayerTotal(p){
  if(!p) return 0;
  if(playerRacesFilled(p)) return playerTotal(p);
  return playerHasTypedTotal(p) ? Number(p.total) : 0;
}
function playerHasScore(p){ return playerRacesFilled(p) || playerHasTypedTotal(p); }
// A player can be substituted for part of a match (e.g. connection issue). subFromRace and
// subToRace are 1-indexed and inclusive: races in [from, to] belong to p.subName, the rest to
// p.n. subToRace is optional and defaults to 12 (sub plays until the end) for older data.
function subRange(p){
  if(!p || !p.subName || !p.subFromRace) return null;
  const from = Math.max(1, Math.min(12, Number(p.subFromRace)));
  const to = p.subToRace ? Math.max(from, Math.min(12, Number(p.subToRace))) : 12;
  return {from, to};
}
function raceOwnerName(p, raceIdx){
  const r = subRange(p);
  if(r && (raceIdx+1) >= r.from && (raceIdx+1) <= r.to) return p.subName;
  return p.n;
}
// Splits a slot into segments (original player, and substitute for their range if any), each
// with their own name and the subset of the 12 races that belongs to them. Used everywhere
// stats need to credit the right person instead of assuming one name covers the whole match.
function playerSegments(p){
  if(!p || !p.n) return [];
  const races = p.races || Array(12).fill('');
  const r = subRange(p);
  if(!r){
    return [{ name: p.n, races, raceIndices: races.map((_,i)=>i) }];
  }
  const mainIdx = [], subIdx = [];
  races.forEach((_,i)=>{ const race = i+1; (race>=r.from && race<=r.to ? subIdx : mainIdx).push(i); });
  const segs = [];
  if(mainIdx.length) segs.push({ name: p.n, races: mainIdx.map(i=>races[i]), raceIndices: mainIdx });
  if(subIdx.length) segs.push({ name: p.subName, races: subIdx.map(i=>races[i]), raceIndices: subIdx });
  return segs;
}

function trackName(id){ if(!id) return ''; const tr = TRACKS.find(t=>t.id===id); return tr ? tr[LANG] : id; }
function emptyMatchPlayers(){ return {h:emptyPlayerSlots(), a:emptyPlayerSlots(), tracks: Array(12).fill('')}; }
function migratePlayerSlot(slot){
  // Older matches encoded before the 12-race system only stored a single total score
  // ({n, s}) per player. Give any such slot a proper races array so the admin form can
  // safely write into it — the old total is kept as race 1 rather than being discarded.
  if(!slot || Array.isArray(slot.races)) return slot;
  const legacyScore = slot.s;
  slot.races = Array(12).fill('');
  if(legacyScore !== undefined && legacyScore !== '' && legacyScore != null) slot.races[0] = legacyScore;
  delete slot.s;
  return slot;
}
function migrateMatchPlayers(pl){
  if(!pl) return pl;
  if(pl.h) pl.h.forEach(migratePlayerSlot);
  if(pl.a) pl.a.forEach(migratePlayerSlot);
  if(!Array.isArray(pl.tracks)) pl.tracks = Array(12).fill('');
  return pl;
}
function migrateAllPlayerData(){
  function migrateGroup(groupsObj){
    for(const id in groupsObj){
      const g = groupsObj[id];
      if(g.players) for(const key in g.players) migrateMatchPlayers(g.players[key]);
    }
  }
  migrateGroup(STATE.quali); migrateGroup(STATE.top); migrateGroup(STATE.mid);
  for(const rk of ['r0','r1','r2','r3']){
    const pls = STATE.bracket.players && STATE.bracket.players[rk];
    if(pls) for(const m in pls) migrateMatchPlayers(pls[m]);
  }
}

const FLAG_RASTER_CACHE = {};   // tag -> PNG data URL (persisted to localStorage)
const FLAG_RASTER_URL = {};     // tag -> short blob: URL used for on-screen <img> (NOT persisted).
// We display flags by referencing this short blob URL instead of inlining the full
// base64 data URL into every cell. Inlining made lists of many flags (e.g. the players
// table) build a multi-megabyte HTML string, which is what stalled tab switches.
function dataURLToBlob(dataURL){
  const comma = dataURL.indexOf(',');
  const meta = dataURL.slice(5, comma);            // e.g. "image/png;base64"
  const isB64 = /;base64$/i.test(meta);
  const mime = meta.replace(/;base64$/i,'') || 'image/png';
  const dataPart = dataURL.slice(comma+1);
  const bin = isB64 ? atob(dataPart) : decodeURIComponent(dataPart);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}
function hydrateRasterURL(tag){
  try{
    const data = FLAG_RASTER_CACHE[tag];
    if(!data) return;
    if(FLAG_RASTER_URL[tag]){ try{ URL.revokeObjectURL(FLAG_RASTER_URL[tag]); }catch(e){} }
    FLAG_RASTER_URL[tag] = URL.createObjectURL(dataURLToBlob(data));
  }catch(e){ /* leave unset — the flag falls back to the lightweight inline SVG */ }
}
function hydrateAllRasterURLs(){ Object.keys(FLAG_RASTER_CACHE).forEach(hydrateRasterURL); }
function rasterizeFlag(tag){
  return new Promise((resolve)=>{
    try{
      const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20">${flagInnerFor(tag)}</svg>`;
      const svgUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
      const img = new Image();
      img.onload = ()=>{
        try{
          const canvas = document.createElement('canvas');
          canvas.width = 480; canvas.height = 320;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 480, 320);
          FLAG_RASTER_CACHE[tag] = canvas.toDataURL('image/png');
          hydrateRasterURL(tag);
        }catch(e){ /* leave uncached, SVG fallback will be used */ }
        resolve();
      };
      img.onerror = ()=> resolve();
      img.src = svgUrl;
    }catch(e){ resolve(); }
  });
}
async function rasterizeAllFlags(){
  await Promise.all(Object.keys(TEAMS).map(rasterizeFlag));

function starPts(cx,cy,rO,rI,n,rot){
  n = n||5; rot = rot===undefined?-90:rot;
  let pts=[];
  for(let i=0;i<n*2;i++){
    const r = i%2===0?rO:rI;
    const a = (Math.PI/n)*i + (rot*Math.PI/180);
    pts.push((cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2));
  }
  return pts.join(' ');

    const x2=cx+rO*Math.cos(a), y2=cy+rO*Math.sin(a);

      return `${stripes}<rect width="${cw}" height="${ch}" fill="${f.canton}"/>` + (f.star?`<circle cx="${cw/2}" cy="${ch/2}" r="1.6" fill="#fff"/>`:'');
    }
    case 'usa': {
      const n=7, h=20/n;
      let stripes = '';
      for(let i=0;i<n;i++) stripes += `<rect y="${i*h}" width="30" height="${h}" fill="${i%2===0?f.stripe:'#FFFFFF'}"/>`;
      const cw=13, ch=h*4;
      let dots='';
      for(let r=0;r<6;r++) for(let c=0;c<8;c++) dots += `<circle cx="${0.85+c*1.6}" cy="${0.85+r*1.6}" r="0.3" fill="#fff"/>`;
      return `${stripes}<rect width="${cw}" height="${ch}" fill="${f.canton}"/>${dots}`;
    }
    case 'puertorico': {
      const n=5, h=20/n;
      let stripes = '';
      for(let i=0;i<n;i++) stripes += `<rect y="${i*h}" width="30" height="${h}" fill="${i%2===0?f.stripe:'#FFFFFF'}"/>`;
      const tri = `<polygon points="0,0 13,10 0,20" fill="${f.canton}"/>`;
      return `${stripes}${tri}${star(4.3,10,1.7,0.7,'#fff',5,-90)}`;
    }
    default: return `<rect width="30" height="20" fill="#333"/>`;
  }
}
let FLAG_OVERRIDES = {};
/* Baked-in copy of the admin's custom flags, so the page can show them instantly
   on a cold start WITHOUT waiting for a Supabase round-trip. Fill this object with
   the export from your live site (see instructions) — keys are team tags, values
   are the flag's inner SVG string. Leave as null to fall back to generated flags
   plus a background fetch. */
const FLAG_OVERRIDES_BAKED = null;
const FLAG_CACHE_KEY = 'mkwc_flag_cache_v1';
const FLAG_CACHE_TTL_MS = 10 * 60 * 1000; // 10 minutes — long enough to skip re-fetching on every refresh
                                            // during a live tournament, short enough that an admin's flag
                                            // change still reaches everyone else within a reasonable time.
function loadFlagCacheFromStorage(){
  try{
    const raw = localStorage.getItem(FLAG_CACHE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.timestamp || (Date.now()-parsed.timestamp) > FLAG_CACHE_TTL_MS) return null;
    return parsed;
  }catch(e){ return null; } // storage unavailable/corrupt — just skip the cache, no harm done
}
function saveFlagCacheToStorage(){
  try{ localStorage.setItem(FLAG_CACHE_KEY, JSON.stringify({ timestamp: Date.now(), overrides: FLAG_OVERRIDES, rasters: FLAG_RASTER_CACHE })); }
  catch(e){ /* storage full or unavailable — harmless to skip caching */ }
}
let PENDING_SYNC = new Set(); // tags applied locally but not yet confirmed saved on the server
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function loadFlagOverrides(){
  FLAG_OVERRIDES = {};
  try{
    const res = await fetch(`${SB_TABLE}?key=like.${encodeURIComponent('flag_override:*')}&select=key,value`, { headers: SB_HEADERS });
    if(res.ok){
      const rows = await res.json();
      rows.forEach(r=>{ FLAG_OVERRIDES[r.key.slice('flag_override:'.length)] = r.value; });
    }
  }catch(e){ /* no overrides yet */ }
}
// Static, cacheable published overrides for regular visitors — no Supabase round-trip.
// This file lives next to index.html and is only re-fetched by browsers when its own
// content actually changes, so editing index.html for anything else no longer forces
// everyone to re-download the flags. Publish new custom flags by using the existing
// "Copier ma sauvegarde" button in the flag editor, then saving that text over
// flags.json and pushing it — a separate, independent deploy from index.html itself.
async function loadFlagOverridesStatic(){
  try{
    const res = await fetch('flags.json', { cache: 'no-cache' }); // revalidate cheaply via ETag/Last-Modified, no full re-download unless changed
    if(res.ok){
      const parsed = await res.json();
      if(parsed && typeof parsed === 'object') FLAG_OVERRIDES = parsed;
    }
  }catch(e){ /* offline, or file not deployed yet — keep the generated flags */ }
}
async function saveFlagOverride(tag, content){
  const delays = [0, 2000, 5000, 10000]; // give the platform's rate limiter real time to reset
  let lastErr;
  for(let i=0;i<delays.length;i++){
    if(delays[i]) await sleep(delays[i]);
    try{
      await SB_STORAGE.set('flag_override:'+tag, content);
      FLAG_OVERRIDES[tag] = content;
      return;
    }catch(e){
      lastErr = e;
      if(!/rate limit/i.test(e.message||'')) throw e; // only retry on rate-limit errors
    }
  }
  throw lastErr;
}
async function deleteFlagOverride(tag){
  try{ await SB_STORAGE.delete('flag_override:'+tag); }catch(e){}
  delete FLAG_OVERRIDES[tag];
  refreshFlagSymbols();
  await rasterizeFlag(tag);
  saveFlagCacheToStorage();
}

/* =========================================================
   STANDINGS CALC
========================================================= */
function computeStandings(slots, scores){
  const rows = slots.map(t=>({tag:t, w:0,l:0,d:0,pf:0,pa:0}));
  pairsFor(slots.length).forEach(([i,j])=>{
    const key = i+'-'+j;
    const sc = scores[key];
    if(!sc || slots[i]==null || slots[j]==null) return;
    const [h,a] = sc;
    if(h===''||a===''||h==null||a==null) return;
    const hh=Number(h), aa=Number(a);
    rows[i].pf+=hh; rows[i].pa+=aa;
    rows[j].pf+=aa; rows[j].pa+=hh;
    if(hh>aa){ rows[i].w++; rows[j].l++; } else if(aa>hh){ rows[j].w++; rows[i].l++; } else { rows[i].d++; rows[j].d++; }
  });
  // Standings points, MKWC style: 3 per win, 1 per draw, 0 per loss.
  const sorted = rows.map((r,idx)=>({...r, played:r.w+r.d+r.l, pts:r.w*3+r.d, diff:r.pf-r.pa, slotIdx:idx}))
    .sort((a,b)=> b.pts-a.pts || b.diff-a.diff || b.pf-a.pf || projectedRank(a.tag)-projectedRank(b.tag));
  const leader = sorted.find(r=>r.tag!=null);
  sorted.forEach(r=>{
    r.gb = (leader && r.tag!=null) ? ((leader.w - r.w) + (r.l - leader.l)) / 2 : null;
  });
  return sorted;
}

function isGroupFullyPlayed(groupObj){
  return pairsFor(groupObj.slots.length).every(([i,j])=>{
    const h = groupObj.slots[i], a = groupObj.slots[j];
    if(h==null || a==null) return false; // team not decided yet — group can't be complete
    const sc = groupObj.scores[i+'-'+j];
    return sc && sc[0]!=='' && sc[1]!=='' && sc[0]!=null && sc[1]!=null;
  });
}
function renderGroupCard(title, groupObj, qualifyCount, hint, anchorId){
  const standings = computeStandings(groupObj.slots, groupObj.scores);
  const anyPlayed = isGroupFullyPlayed(groupObj);
  let rows = '';
  standings.forEach((r,i)=>{
    const isQ = anyPlayed && i < qualifyCount && r.tag!=null;
    const posClass = i===0 ? 'pos p1' : 'pos';
    rows += `<tr class="${isQ?'qualified':''}">
      <td class="${posClass}">P${i+1}</td>
      <td><div class="teamcell">${r.tag? teamLinkHTML(r.tag) : tbdEl()+`<span class="tbdname">${t('tbd')}</span>`}</div></td>
      <td class="num">${r.played}</td>

      <tbody>${rows}</tbody>

function deriveBracketRounds(){
  const rounds = [STATE.bracket.slots.slice()];
  const roundScores = [STATE.bracket.scores.r0, STATE.bracket.scores.r1, STATE.bracket.scores.r2, STATE.bracket.scores.r3];
  for(let r=0;r<3;r++){
    const prev = rounds[r]; const next=[];
    for(let m=0;m<prev.length/2;m++){
      const h=prev[m*2], a=prev[m*2+1]; const sc=roundScores[r][m];
      let winner=null;
      if(sc && h!=null && a!=null && sc[0]!=='' && sc[1]!=='' && sc[0]!=null && sc[1]!=null){
        winner = Number(sc[0])>Number(sc[1]) ? h : (Number(sc[1])>Number(sc[0]) ? a : null);
      }
      next.push(winner);
    }
    rounds.push(next);
  }
  return {rounds, roundScores};
}

========================================================= */
function parseMatchRef(ref){
  if(!ref) return null;
  const parts = ref.split('|');
  if(parts[0]==='g'){
    const anchorPrefix = parts[1], id = parts[2];
    const i = Number(parts[3]), j = Number(parts[4]);
    const groupsObj = anchorPrefix==='quali' ? STATE.quali : (anchorPrefix==='top' ? STATE.top : STATE.mid);
    const g = groupsObj && groupsObj[id];
    if(!g) return null;
    const h = g.slots[i], a = g.slots[j];
    const key = i+'-'+j;
    const sc = g.scores[key] || ['',''];
    const pl = g.players[key] || emptyMatchPlayers();
    const stageLabel = anchorPrefix==='quali' ? t('stageQuali') : t('stagePhaseGroupes');
    const iso = scheduledTimeFor(anchorPrefix, id, key);
    const dateStr = iso ? formatScheduledLocal(iso) : (anchorPrefix==='quali' ? t('dateQuali') : t('datePhase'));
    return {h, a, sc, players:pl, stage:`${stageLabel} · Gr. ${id}`, date:dateStr, anchor:`group-${anchorPrefix}-${id}`, rawIso: iso||null};
  } else if(parts[0]==='b'){
    const round = Number(parts[1]), idx = Number(parts[2]);
    const {rounds, roundScores} = deriveBracketRounds();
    const slots = rounds[round];
    if(!slots) return null;
    const h = slots[idx*2], a = slots[idx*2+1];
    const sc = roundScores[round][idx] || ['',''];
    const pl = (STATE.bracket.players['r'+round]||{})[idx] || emptyMatchPlayers();
    return {h, a, sc, players:pl, stage:`${t('stageBracket')} · ${ROUND_NAMES_F()[round]}`, date:ROUND_DATES_F()[round], anchor:null, rawIso:null};
  }
  return null;
}

function raceProgressChartHTML(playersH, playersA, teamH, teamA){
  // Cumulative team score after each race, race by race — only up to the last race with any data entered.
  let lastRace = -1;
  for(let r=0;r<12;r++){
    const anyEntered = [...playersH,...playersA].some(p=> p.n && p.races && p.races[r]!=='' && p.races[r]!=null);
    if(anyEntered) lastRace = r;
  }
  if(lastRace < 0) return '';
  const cumH = [], cumA = [];
  let runH=0, runA=0;
  for(let r=0;r<=lastRace;r++){
    runH += playersH.reduce((s,p)=> s + (p.n && p.races[r]!=='' && p.races[r]!=null ? (Number(p.races[r])||0) : 0), 0);
    runA += playersA.reduce((s,p)=> s + (p.n && p.races[r]!=='' && p.races[r]!=null ? (Number(p.races[r])||0) : 0), 0);
    cumH.push(runH); cumA.push(runA);
  }
  const w=560, h=220, padL=40, padR=16, padT=16, padB=30;
  const n = cumH.length;
  const maxVal = Math.max(1, ...cumH, ...cumA);
  const x = i => n>1 ? padL + (i/(n-1))*(w-padL-padR) : padL;
  const y = v => padT + (1 - v/maxVal) * (h-padT-padB);
  const pathFor = arr => arr.map((v,i)=> `${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const gridLines = [0,0.25,0.5,0.75,1].map(f=>{
    const yy = padT + f*(h-padT-padB);
    const val = Math.round(maxVal*(1-f));
    return `<line x1="${padL}" y1="${yy}" x2="${w-padR}" y2="${yy}" stroke="rgba(255,235,210,0.12)" stroke-width="1"/>
      <text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="10" fill="#D9B996" font-family="JetBrains Mono, monospace">${val}</text>`;
  }).join('');
  const xLabels = cumH.map((_,i)=> `<text x="${x(i).toFixed(1)}" y="${h-padB+16}" text-anchor="middle" font-size="10" fill="#D9B996" font-family="JetBrains Mono, monospace">${i+1}</text>`).join('');
  return `<div class="race-chart-wrap">
    <h3 class="race-chart-title">${t('raceChartTitle')}</h3>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;display:block;">
      ${gridLines}
      ${xLabels}
      <path d="${pathFor(cumH)}" fill="none" stroke="#FFCE54" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="${pathFor(cumA)}" fill="none" stroke="#8FA8D9" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${cumH.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="#FFCE54"/>`).join('')}
      ${cumA.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="#8FA8D9"/>`).join('')}
    </svg>
    <div class="race-chart-legend">
      <span><span class="dot" style="background:#FFCE54;"></span>${teamName(teamH)}</span>
      <span><span class="dot" style="background:#8FA8D9;"></span>${teamName(teamA)}</span>
    </div>
  </div>`;
}

function getTotalMatchCount(){
  let total = 0;
  Object.values(QUALI_GROUPS).forEach(g => { total += pairsFor(g.teams.length).length; });
  Object.keys(MID_GROUPS).forEach(() => { total += pairsFor(4).length; });
  Object.values(TOP_GROUPS).forEach(g => { total += pairsFor(g.teams.length).length; });
  total += 15; // bracket: 8 + 4 + 2 + 1
  return total;
}
function getAllMatchItems(){
  const items = [];
  function pushGroupMatches(groupsObj, stageLabel, dateStr, anchorPrefix, idsOrder, dateKey, dateOrder){
    idsOrder.forEach((id)=>{
      const g = groupsObj[id];
      if(!g) return;
      pairsFor(g.slots.length).forEach(([i,j])=>{
        const h=g.slots[i], a=g.slots[j];
        if(h==null || a==null) return;
        const key = i+'-'+j;
        const sc = g.scores[key];
        const iso = scheduledTimeFor(anchorPrefix, id, key);
        let itemDate = dateStr, itemDayLabel = dateStr, itemDateKey = dateKey, itemDateOrder = dateOrder * 1e10;
        if(iso){
          itemDate = formatScheduledLocal(iso);
          itemDayLabel = formatScheduledLocalDateOnly(iso);
          itemDateKey = localDateKey(iso); // one bucket per exact calendar day, in the visitor's own reading of the ISO date
          itemDateOrder = dateOrder * 1e10 + Math.floor(new Date(iso).getTime()/1000);
        }
        items.push({
          stage:`${stageLabel} · Gr. ${id}`, date:itemDate, dayLabel:itemDayLabel, h,a, sc,
          anchor:`group-${anchorPrefix}-${id}`, matchRef:`g|${anchorPrefix}|${id}|${i}|${j}`,
          dateKey:itemDateKey, dateOrder:itemDateOrder, rawIso: iso || null
        });
      });
    });
  }
  pushGroupMatches(STATE.quali, t('stageQuali'), t('dateQuali'), 'quali', ['W','X','Y','Z'], 'quali', 0);
  pushGroupMatches(STATE.mid, t('stagePhaseGroupes'), t('datePhase'), 'mid', ['1','2','3','4'], 'groupstage', 1);
  pushGroupMatches(STATE.top, t('stagePhaseGroupes'), t('datePhase'), 'top', ['A','B'], 'groupstage', 1);

  const {rounds, roundScores} = deriveBracketRounds();
  for(let r=0;r<4;r++){
    const slots = rounds[r];
    for(let m=0;m<slots.length/2;m++){
      const h=slots[m*2], a=slots[m*2+1];
      if(h==null||a==null) continue;
      items.push({
        stage:`${t('stageBracket')} · ${ROUND_NAMES_F()[r]}`, date:ROUND_DATES_F()[r], dayLabel:ROUND_DATES_F()[r], h, a, sc:roundScores[r][m],
        matchRef:`b|${r}|${m}`, anchor:null,
        dateKey:`bracket-${r}`, dateOrder: (2+r) * 1e10
      });
    }
  }
  return items;
}
function isPlayed(sc){ return sc && sc[0]!=='' && sc[1]!=='' && sc[0]!=null && sc[1]!=null; }
function matchCardHTML(it){
  const played = isPlayed(it.sc);
  let scoreHTML = '';
  if(played){
    const draw = Number(it.sc[0])===Number(it.sc[1]);
    const hWin = draw || Number(it.sc[0])>Number(it.sc[1]);
    const aWin = draw || Number(it.sc[1])>Number(it.sc[0]);
    scoreHTML = `<span class="${hWin?'score-win':'score-lose'}">${it.sc[0]}</span> – <span class="${aWin?'score-win':'score-lose'}">${it.sc[1]}</span>`;
  }

  return `<div class="cal-item match-card" data-matchref="${it.matchRef}">

function streamLinkFor(ref){
  const url = STATE.streams && STATE.streams[ref];
  return (typeof url === 'string' && url.trim() !== '') ? url.trim() : null;

const MATCH_DURATION_MS = 60 * 60 * 1000; // a war/set is assumed to last about an hour
function isCurrentlyLive(rawIso, sc){
  if(!rawIso || isPlayed(sc)) return false;
  const start = new Date(rawIso).getTime();
  const now = Date.now();
  return start <= now && (now - start) < MATCH_DURATION_MS;
}
function getLiveMatchesNow(){
  return getAllMatchItems().filter(it => isCurrentlyLive(it.rawIso, it.sc));

function getPlayInStartMs(){
  return Math.min(...Object.values(SCHEDULED_TIMES).map(iso=>new Date(iso).getTime()));
}
// True only when every scheduled match of the given group stage (both teams known)
// actually has a score. Used so a "stage finished" banner can't appear while a
// postponed match is still pending, even if the calendar date has passed.
function allGroupMatchesPlayed(groupsObj){
  for(const id in groupsObj){
    const g = groupsObj[id];
    if(!g) continue;
    const pairs = pairsFor(g.slots.length);
    for(const [i,j] of pairs){
      if(g.slots[i]==null || g.slots[j]==null) continue; // opponent not set yet
      if(!isPlayed(g.scores[i+'-'+j])) return false;
    }
  }
  return true;
}
function getTournamentPhaseStatus(){
  const now = new Date();
  const dOnly = (y,m,d)=> new Date(y,m-1,d).getTime();
  const today = dOnly(now.getFullYear(), now.getMonth()+1, now.getDate());
  const playInEnd=dOnly(2026,7,13);
  const groupStart=dOnly(2026,7,17), groupEnd=dOnly(2026,7,20);
  const bracketStart=dOnly(2026,7,24), bracketEnd=dOnly(2026,8,3);
  if(now.getTime() < getPlayInStartMs()) return {phase:'before', key:'homeStatusBefore'};
  // Don't declare the Play-In finished until its matches are actually all played —
  // a postponement can push a match past the planned end date.
  if(today < playInEnd || !allGroupMatchesPlayed(STATE.quali)) return {phase:'playin', key:'homeStatusPlayin'};
  if(today < groupStart) return {phase:'between1', key:'homeStatusBetween1'};
  // Same guard for the Group Stage (top + mid groups).
  if(today < groupEnd || !(allGroupMatchesPlayed(STATE.top) && allGroupMatchesPlayed(STATE.mid))) return {phase:'group', key:'homeStatusGroup'};
  if(today < bracketStart) return {phase:'between2', key:'homeStatusBetween2'};
  if(today < bracketEnd) return {phase:'bracket', key:'homeStatusBracket'};
  return {phase:'after', key:'homeStatusAfter'};
}

function startCountdown(targetMs){

    const s = Math.floor(diff/1000);
    const days = Math.floor(s/86400), hours = Math.floor((s%86400)/3600), minutes = Math.floor((s%3600)/60), seconds = s%60;

function getTeamStats(tag){
  let w=0,l=0,d=0,pf=0,pa=0,played=0;
  const appearances = [];
  function scan(groupsObj, label, anchorPrefix){
    for(const id in groupsObj){
      const g = groupsObj[id];
      const idx = g.slots.indexOf(tag);
      if(idx===-1) continue;
      const standings = computeStandings(g.slots, g.scores);
      const pos = standings.findIndex(r=>r.tag===tag)+1;
      appearances.push({label:`${label} · Gr. ${id}`, pos, total:g.slots.filter(x=>x!=null).length, anchor:`group-${anchorPrefix}-${id}`});
      pairsFor(g.slots.length).forEach(([i,j])=>{
        if(i!==idx && j!==idx) return;
        const sc = g.scores[i+'-'+j];
        if(!sc || sc[0]===''||sc[1]===''||sc[0]==null||sc[1]==null) return;
        const meIsHome = i===idx;
        const my = Number(meIsHome?sc[0]:sc[1]), opp = Number(meIsHome?sc[1]:sc[0]);
        played++; pf+=my; pa+=opp;
        if(my>opp) w++; else if(opp>my) l++; else d++;
      });
    }
  }
  scan(STATE.quali, t('stageQuali'), 'quali');
  scan(STATE.top, t('stagePhaseGroupes'), 'top');
  scan(STATE.mid, t('stagePhaseGroupes'), 'mid');
  // bracket
  const {rounds, roundScores} = deriveBracketRounds();
  for(let r=0;r<4;r++){
    const slots = rounds[r];
    const idx = slots.indexOf(tag);
    if(idx===-1) continue;
    const m = Math.floor(idx/2);
    const sc = roundScores[r][m];
    appearances.push({label:`${t('stageBracket')} · ${ROUND_NAMES_F()[r]}`, pos:null, total:null, anchor:null});
    if(sc && sc[0]!==''&&sc[1]!==''&&sc[0]!=null&&sc[1]!=null){
      const meIsHome = idx%2===0;
      const my = Number(meIsHome?sc[0]:sc[1]), opp = Number(meIsHome?sc[1]:sc[0]);
      played++; pf+=my; pa+=opp;
      if(my>opp) w++; else if(opp>my) l++; else d++;
    }
  }
  return {w,l,d,pf,pa,played,diff:pf-pa,appearances};
}

function stdDev(arr){
  if(arr.length<2) return null;
  const mean = arr.reduce((s,v)=>s+v,0)/arr.length;
  const variance = arr.reduce((s,v)=>s+(v-mean)*(v-mean),0)/arr.length;
  return Math.sqrt(variance);
}
function getAdvancedStats(){
  const playerAllRaces = {}; // "tag|name" -> [every individual race score across the tournament]
  const playerMatchRaces = {}; // "tag|name" -> [ [12 race scores for one full match], ... ]
  const teamMatchTotals = {}; // tag -> [ [6 player totals for one match], ... ]

  function scanMatch(pl, tagH, tagA){
    if(!pl) return;
    [[pl.h, tagH], [pl.a, tagA]].forEach(([arr, tag])=>{
      if(!tag || !arr) return;
      const matchTotals = [];
      arr.forEach(p=>{
        if(!p.n) return;
        const slotFilled = (p.races||[]).some(v=>v!=='' && v!=null);
        if(!slotFilled) return;
        // Team balance cares about how many points this slot contributed, regardless of who played it.
        matchTotals.push((p.races||[]).reduce((s,v)=> s + (v!=='' && v!=null ? Number(v) : 0), 0));
        // Individual stats (consistency, clutch) need to credit the right person per race.
        playerSegments(p).forEach(seg=>{
          const races = seg.races.map(v=> v!=='' && v!=null ? Number(v) : null);
          const filled = races.filter(v=>v!=null);
          if(!filled.length) return;
          const pkey = tag+'|'+seg.name;
          playerAllRaces[pkey] = (playerAllRaces[pkey]||[]).concat(filled);
          if(filled.length===12){ // only a full, un-substituted match counts toward "finishing strong"
            playerMatchRaces[pkey] = playerMatchRaces[pkey] || [];
            playerMatchRaces[pkey].push(races);
          }
        });
      });
      if(matchTotals.length===6){
        teamMatchTotals[tag] = teamMatchTotals[tag] || [];
        teamMatchTotals[tag].push(matchTotals);
      }
    });
  }
  function scanGroups(groupsObj){
    for(const id in groupsObj){
      const g = groupsObj[id];
      for(const key in (g.players||{})){
        const [i,j] = key.split('-').map(Number);
        scanMatch(g.players[key], g.slots[i], g.slots[j]);
      }
    }
  }
  scanGroups(STATE.quali); scanGroups(STATE.top); scanGroups(STATE.mid);
  const {rounds} = deriveBracketRounds();
  for(let r=0;r<4;r++){
    const slots = rounds[r];
    const pls = STATE.bracket.players['r'+r] || {};
    for(const m in pls) scanMatch(pls[m], slots[m*2], slots[m*2+1]);
  }

  // Consistency: standard deviation of a player's individual race scores — smaller means
  // steadier. (The old best-minus-worst range saturated near 14 for almost everyone, since
  // any decent sample includes a ~15 and a ~1; stddev captures the real spread instead.)
  const consistency = {};
  for(const pkey in playerAllRaces){
    const races = playerAllRaces[pkey];
    if(races.length<2) continue;
    const sd = stdDev(races);
    if(sd!=null) consistency[pkey] = sd;
  }

  // Clutch: average of the second half (races 7-12) minus the first half (races 1-6),
  // per match, then averaged — positive means a player finishes a match stronger than
  // they started it. A 6-vs-6 split is more balanced and less noisy than 3-vs-9.
  const clutch = {};
  for(const pkey in playerMatchRaces){
    const diffs = playerMatchRaces[pkey].map(races=>{
      const early = races.slice(0,6).reduce((s,v)=>s+v,0)/6;
      const late = races.slice(6,12).reduce((s,v)=>s+v,0)/6;
      return late-early;
    });
    if(diffs.length) clutch[pkey] = diffs.reduce((s,v)=>s+v,0)/diffs.length;
  }

  // Team balance: how spread out the 6 players' match totals are, averaged over the team's matches —
  // smaller means the points are shared evenly rather than resting on one or two players.
  const balance = {};
  for(const tag in teamMatchTotals){
    const perMatchSpread = teamMatchTotals[tag].map(totals=> stdDev(totals)).filter(v=>v!=null);
    if(perMatchSpread.length) balance[tag] = perMatchSpread.reduce((s,v)=>s+v,0)/perMatchSpread.length;
  }

  return { consistency, clutch, balance };
}
function getRaceStats(){
  const playerTrackStats = {}; // "tag|name" -> { trackId -> {count, total} }
  const teamTrackStats = {}; // tag -> { trackId -> {count, total} }

  function scanMatch(pl, tagH, tagA){
    if(!pl || !pl.tracks) return;
    [[pl.h, tagH], [pl.a, tagA]].forEach(([arr, tag])=>{
      if(!tag || !arr) return;
      // player-level: one entry per player, per race they actually played
      arr.forEach(p=>{
        if(!p.n) return;
        (p.races||[]).forEach((val, r)=>{
          if(val==='' || val==null) return;
          const score = Number(val)||0;
          const trackId = pl.tracks[r];
          if(!trackId) return;
          const owner = raceOwnerName(p, r);
          const pkey = tag+'|'+owner;
          playerTrackStats[pkey] = playerTrackStats[pkey] || {};
          playerTrackStats[pkey][trackId] = playerTrackStats[pkey][trackId] || {count:0, total:0};
          playerTrackStats[pkey][trackId].count++;
          playerTrackStats[pkey][trackId].total += score;
        });
      });
      // team-level: one entry per race the team actually played (not one per player),
      // using the team's combined score for that race — so 6 players playing the same
      // race counts as the team playing that track once, not six times.
      for(let r=0;r<12;r++){
        const trackId = pl.tracks[r];
        if(!trackId) continue;
        const scoresThisRace = arr.filter(p=>p.n && p.races && p.races[r]!=='' && p.races[r]!=null).map(p=>Number(p.races[r])||0);
        if(!scoresThisRace.length) continue;
        const teamRaceTotal = scoresThisRace.reduce((s,v)=>s+v,0);
        teamTrackStats[tag] = teamTrackStats[tag] || {};
        teamTrackStats[tag][trackId] = teamTrackStats[tag][trackId] || {count:0, total:0};
        teamTrackStats[tag][trackId].count++;
        teamTrackStats[tag][trackId].total += teamRaceTotal;
      }
    });
  }
  function scanGroups(groupsObj){
    for(const id in groupsObj){
      const g = groupsObj[id];
      for(const key in (g.players||{})){
        const [i,j] = key.split('-').map(Number);
        scanMatch(g.players[key], g.slots[i], g.slots[j]);
      }
    }
  }
  scanGroups(STATE.quali);
  scanGroups(STATE.top);
  scanGroups(STATE.mid);
  const {rounds} = deriveBracketRounds();
  for(let r=0;r<4;r++){
    const slots = rounds[r];
    const pls = STATE.bracket.players['r'+r] || {};
    for(const m in pls) scanMatch(pls[m], slots[m*2], slots[m*2+1]);
  }

  function bestTrackFromStats(statsObj){
    const result = {};
    for(const key in statsObj){
      let best=null, bestCount=-1, bestAvg=-1;
      for(const tid in statsObj[key]){
        const s = statsObj[key][tid];
        const avg = s.total/s.count;
        // Prefer the track played the most — a single lucky race shouldn't outrank a track
        // actually mastered over several attempts. Average only breaks ties within the same count.
        if(s.count>bestCount || (s.count===bestCount && avg>bestAvg)){ bestCount=s.count; bestAvg=avg; best=tid; }
      }
      result[key] = best;
    }
    return result;
  }

  return {
    bestTrackForPlayer: bestTrackFromStats(playerTrackStats),
    bestTrackForTeam: bestTrackFromStats(teamTrackStats),
    playerTrackStats, teamTrackStats,
  };
}
function trackBreakdownList(statsForKey){
  if(!statsForKey) return [];
  return Object.keys(statsForKey).map(tid=>({
    trackId: tid, count: statsForKey[tid].count, avg: statsForKey[tid].total/statsForKey[tid].count
  })).sort((a,b)=> b.count-a.count || b.avg-a.avg);
}
function formatMatchCount(n){
  if(n==null) return '—';
  const rounded = Math.round(n*10)/10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}
function getPlayerStats(){
  const stats = {}; // tag -> {name -> {count, total, w, l}}
  function add(tag, name, score, result, weight){
    if(!tag || !name) return;
    stats[tag] = stats[tag] || {};
    if(!stats[tag][name]) stats[tag][name] = {count:0, total:0, w:0, l:0};
    const s = stats[tag][name];
    s.count += weight;
    s.total += (isFinite(score) ? Number(score) : 0);
    if(result==='w') s.w += weight; else if(result==='l') s.l += weight;
  }
  function resultsFor(sc){
    if(!sc || sc[0]===''||sc[1]===''||sc[0]==null||sc[1]==null) return [null,null];
    const hh=Number(sc[0]), aa=Number(sc[1]);
    if(hh>aa) return ['w','l'];
    if(aa>hh) return ['l','w'];
    return [null,null];
  }
  function segFilled(seg){ return seg.races.some(v=>v!=='' && v!=null); }
  // A player who only raced part of a match (substitute, or a match still being encoded live)
  // is credited proportionally: e.g. 5 of 12 races counts as 0.4 of a match, with their real,
  // unprojected points — so their average per match stays fair without inventing scores.
  function segWeight(seg){ return seg.races.filter(v=>v!=='' && v!=null).length / 12; }
  function segTotal(seg){ return seg.races.reduce((s,v)=> s + (v!=='' && v!=null ? (Number(v)||0) : 0), 0); }
  // Credit one team's slots for a match. Players with detailed races are credited per
  // segment; a player with only a hand-typed match total (no races yet) is credited as one
  // full match with that total — so team score and per-match average stay right, while the
  // race-level stats (best track, consistency, clutch) simply skip them until detail exists.
  function creditSlots(arr, tag, result){
    (arr||[]).forEach(p=>{
      if(!p || !p.n) return;
      if(playerRacesFilled(p)){
        playerSegments(p).forEach(seg=>{ if(segFilled(seg)) add(tag, seg.name, segTotal(seg), result, segWeight(seg)); });
      } else if(playerHasTypedTotal(p)){
        add(tag, p.n, Number(p.total), result, 1);
      }
    });
  }
  function scan(groupsObj){
    for(const id in groupsObj){
      const g = groupsObj[id];
      for(const key in (g.players||{})){
        const [i,j] = key.split('-').map(Number);
        const pl = g.players[key];
        const [hRes,aRes] = resultsFor(g.scores[key]);
        creditSlots(pl.h, g.slots[i], hRes);
        creditSlots(pl.a, g.slots[j], aRes);
      }
    }
  }
  scan(STATE.quali); scan(STATE.top); scan(STATE.mid);
  const {rounds, roundScores} = deriveBracketRounds();
  for(let r=0;r<4;r++){
    const slots = rounds[r];
    const pls = STATE.bracket.players['r'+r] || {};
    for(const m in pls){
      const pl = pls[m];
      const h = slots[m*2], a = slots[m*2+1];
      const [hRes,aRes] = resultsFor(roundScores[r][m]);
      creditSlots(pl.h, h, hRes);
      creditSlots(pl.a, a, aRes);
    }
  }
  // compute averages
  for(const tag in stats){
    for(const name in stats[tag]){
      const s = stats[tag][name];
      s.avg = s.count ? s.total/s.count : 0;
      s.winPct = s.count ? s.w/s.count : 0;
    }
  }
  return stats;
}
// Ranking key that avoids the "saw-tooth" you get from sorting by match count first:
// a Bayesian-adjusted average that gently pulls small samples toward the global mean,
// so more matches earns trust without letting one lucky match top the board. Players are
// still shown with their REAL average; only the ORDER uses this adjusted value.
const RANK_CONFIDENCE = 2;
function makePlayerRanker(playerStats){
  let totalPoints = 0, totalCount = 0;
  for(const tag in playerStats){
    for(const name in playerStats[tag]){
      const s = playerStats[tag][name];
      totalPoints += s.total; totalCount += s.count;
    }
  }
  const globalMean = totalCount ? totalPoints/totalCount : 0;
  return function adjustedAvg(count, avg){
    if(!count) return 0;
    return (RANK_CONFIDENCE*globalMean + count*avg) / (RANK_CONFIDENCE + count);
  };
}
function getAllTeamStats(){
  return Object.keys(TEAMS).map(tag=>{
    const st = getTeamStats(tag);
    return {tag, ...st, winPct: st.played ? st.w/st.played : 0, avg: st.played ? st.pf/st.played : 0};
  });
}
const PROJECTED_RANK = ['JPN','FR','USA','ESP','CAN','ENG','GER','ITA','IRE','ASIA','BE','KOR','MEX','AUS','CL','CB','NL','EEU','VE','HKT','PE','PR','BRA','MENA','EC','CH','AUT','CA','PT','RD','LUX'];
function projectedRank(tag){
  const i = PROJECTED_RANK.indexOf(tag);
  return i===-1 ? 999 : i;
}
function teamTier(tag){
  for(const id in STATE.top){ if(STATE.top[id].slots.includes(tag)) return 'higher'; }
  for(const id in STATE.mid){ if(STATE.mid[id].slots.includes(tag)) return 'middle'; }
  return 'lower';
}
// kept for compatibility with any leftover callers — now backed by the same data
function getMvpCounts(){
  const stats = getPlayerStats();
  const counts = {};
  for(const tag in stats){
    counts[tag] = {};
    for(const name in stats[tag]) counts[tag][name] = stats[tag][name].count;
  }
  return counts;
}

function getAllTeamMatches(tag){
  const items = [];
  function scan(groupsObj, stageLabel, dateStr, anchorPrefix, coarseOrder){
    for(const id in groupsObj){
      const g = groupsObj[id];
      const idx = g.slots.indexOf(tag);
      if(idx===-1) continue;
      pairsFor(g.slots.length).forEach(([i,j])=>{
        if(i!==idx && j!==idx) return;
        const opp = g.slots[i===idx?j:i];
        if(opp==null) return;
        const key = i+'-'+j;
        const sc = g.scores[key];
        const played = sc && sc[0]!=='' && sc[1]!=='' && sc[0]!=null && sc[1]!=null;
        const mySc = played ? (i===idx ? sc : [sc[1],sc[0]]) : null;
        const iso = scheduledTimeFor(anchorPrefix, id, key);
        const dateOrder = coarseOrder*1e10 + (iso ? Math.floor(new Date(iso).getTime()/1000) : 0);
        items.push({stage:`${stageLabel} · Gr. ${id}`, date: iso ? formatScheduledLocal(iso) : dateStr, opp, sc:mySc, played, dateOrder, anchor:`group-${anchorPrefix}-${id}`, matchRef:`g|${anchorPrefix}|${id}|${i}|${j}`});
      });
    }
  }
  scan(STATE.quali, t('stageQuali'), t('dateQuali'), 'quali', 0);
  scan(STATE.top, t('stagePhaseGroupes'), t('datePhase'), 'top', 1);
  scan(STATE.mid, t('stagePhaseGroupes'), t('datePhase'), 'mid', 1);
  const {rounds, roundScores} = deriveBracketRounds();
  for(let r=0;r<4;r++){
    const slots = rounds[r];
    const idx = slots.indexOf(tag);
    if(idx===-1) continue;
    const m = Math.floor(idx/2);
    const opp = slots[idx%2===0?idx+1:idx-1];
    if(opp==null) continue;
    const sc = roundScores[r][m];
    const played = sc && sc[0]!=='' && sc[1]!=='' && sc[0]!=null && sc[1]!=null;
    const mySc = played ? (idx%2===0 ? sc : [sc[1],sc[0]]) : null;
    items.push({stage:`${t('stageBracket')} · ${ROUND_NAMES_F()[r]}`, date:ROUND_DATES_F()[r], opp, sc:mySc, played, dateOrder:(2+r)*1e10, matchRef:`b|${r}|${m}`});
  }
  items.sort((a,b)=> a.dateOrder-b.dateOrder);
  return items;
}

function getRecentResultsFor(tag){ return getAllTeamMatches(tag).filter(it=>it.played); }

      html += `<div class="stats-table-wrap"><table class="stats-table" id="leaderList">
