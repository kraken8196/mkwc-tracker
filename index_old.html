        <tbody>`;
      all.forEach((p,i)=>{
        const bestTid = raceStats.bestTrackForPlayer[p.tag+'|'+p.name];
        const pkey = p.tag+'|'+p.name;
        const cons = advStats.consistency[pkey];
        const clu = advStats.clutch[pkey];
        html += `<tr class="leader-row" data-rank="${i+1}" data-name="${p.name.toLowerCase()}" data-team="${teamName(p.tag).toLowerCase()}">
          <td class="lp ${i===0?'top1':''}">${i+1}</td>
          <td><span class="teamcell">${flagEl(p.tag,'sm')}<span class="lname"><span class="player-name-link" data-player-tag="${p.tag}" data-player-name="${p.name}">${p.name}</span></span></span></td>
          <td class="lteam">${teamName(p.tag)}</td>
          <td class="num">${formatMatchCount(p.count)}</td>
          <td class="num">${Math.round(p.winPct*100)}%</td>
          <td class="num highlight">${p.avg.toFixed(1)}</td>
          <td class="lteam">${bestTid?trackName(bestTid):'—'}</td>
          <td class="num">${cons!=null?cons.toFixed(1):'—'}</td>
          <td class="num">${clu!=null?(clu>0?'+':'')+clu.toFixed(1):'—'}</td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      html += `<div class="players-more-wrap"><button class="chip" id="playersMoreBtn" style="display:none;"></button><div class="players-empty-search" id="playersEmptySearch" style="display:none;">${t('searchNoResult')}</div></div>`;
    }
  } else {
    const TIER_ORDER = {higher:0, middle:1, lower:2};
    function compareTeams(a, b){
      const aPlayed = a.played>0, bPlayed = b.played>0;
      if(!aPlayed && !bPlayed){
        // neither has played yet: pure pre-tournament projected ranking (can cross tiers)
        return projectedRank(a.tag)-projectedRank(b.tag);
      }
      if(aPlayed !== bPlayed){
        // one has played, the other hasn't: only let real results override the projection
        // if the active team is from an equal-or-higher tier than the team still waiting
        const tierDiff = TIER_ORDER[teamTier(a.tag)] - TIER_ORDER[teamTier(b.tag)];
        if(tierDiff !== 0) return tierDiff;
        return aPlayed ? -1 : 1;
      }
      // both have played: rank by win percentage first, then point differential, as
      // stated in the note above the table. Average and projection only break ties.
      return (b.winPct-a.winPct) || (b.diff-a.diff) || (b.avg-a.avg) || projectedRank(a.tag)-projectedRank(b.tag);
    }
    const teams = getAllTeamStats().sort(compareTeams);
    html += `<div class="stage-note">${t('teamsStatsNote')}</div>`;
    html += `<div class="stats-table-wrap"><table class="stats-table" id="teamStatsList">
      <thead><tr><th></th>${th('colTeam')}${th('statMatches','tipMatches','num')}${th('statW','tipW','num')}${th('colD','tipD','num')}${th('statL','tipL','num')}${th('colWinPct','tipWinPct','num')}${th('statDiff','tipDiff','num')}${th('colAvg','tipTeamAvg','num')}${th('colBestTrack','tipBestTrack')}${th('colBalance','tipBalance','num')}</tr></thead>
      <tbody>`;
    teams.forEach((tm,i)=>{
      const bestTid = raceStats.bestTrackForTeam[tm.tag];
      const bal = advStats.balance[tm.tag];
      html += `<tr class="leader-row" data-team="${teamName(tm.tag).toLowerCase()}">
        <td class="lp ${i===0?'top1':''}">${i+1}</td>
        <td><span class="teamcell">${teamLinkHTML(tm.tag)}</span></td>
        <td class="num">${tm.played}</td>
        <td class="num">${tm.w}</td>
        <td class="num">${tm.d}</td>
        <td class="num">${tm.l}</td>
        <td class="num">${tm.played? Math.round(tm.winPct*100)+'%' : '—'}</td>
        <td class="num">${tm.diff>0?'+':''}${tm.diff}</td>
        <td class="num highlight">${tm.played? tm.avg.toFixed(1) : '—'}</td>
        <td class="lteam">${bestTid?trackName(bestTid):'—'}</td>
        <td class="num">${bal!=null?bal.toFixed(1):'—'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  el.innerHTML = html;
  el.querySelectorAll('[data-statsmode]').forEach(b=> b.onclick = ()=>{ statsMode = b.dataset.statsmode; playersShown = PLAYERS_PAGE; renderPlayersView(); });
  el.querySelectorAll('.player-name-link').forEach(link=>{
    link.onclick = (e)=>{
      e.stopPropagation();
      pushNavHistory();
      selectedPlayer = {tag: link.dataset.playerTag, name: link.dataset.playerName};
      setView('player');
      renderPlayerDetail(selectedPlayer.tag, selectedPlayer.name);
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });

  // Players tab: live search + "show more" pagination (60 at a time). When a search
  // is active every match is shown (no pagination); otherwise only the top N.
  const searchEl = document.getElementById('playerSearch');
  if(searchEl){
    const rows = Array.from(el.querySelectorAll('#leaderList tbody tr'));
    const moreBtn = document.getElementById('playersMoreBtn');
    const emptyEl = document.getElementById('playersEmptySearch');
    function applyPlayersFilter(){
      const q = searchEl.value.trim().toLowerCase();
      let shownCount = 0;
      rows.forEach(row=>{
        const matches = !q || row.dataset.name.includes(q) || row.dataset.team.includes(q);
        if(!matches){ row.style.display = 'none'; return; }
        if(q || shownCount < playersShown){ row.style.display = ''; shownCount++; }
        else { row.style.display = 'none'; shownCount++; }
      });
      const totalMatching = q
        ? rows.filter(r=> r.dataset.name.includes(q) || r.dataset.team.includes(q)).length
        : rows.length;
      if(emptyEl) emptyEl.style.display = (q && totalMatching===0) ? '' : 'none';
      if(moreBtn){
        const canShowMore = !q && playersShown < rows.length;
        moreBtn.style.display = canShowMore ? '' : 'none';
        if(canShowMore){
          const next = Math.min(PLAYERS_PAGE, rows.length - playersShown);
          moreBtn.textContent = `${t('showMore')} (+${next})`;
        }
      }
    }
    searchEl.addEventListener('input', ()=>{ applyPlayersFilter(); });
    if(moreBtn) moreBtn.onclick = ()=>{ playersShown += PLAYERS_PAGE; applyPlayersFilter(); };
    applyPlayersFilter();
  }
}

  el.innerHTML = html;

  function backupText(){ return JSON.stringify(FLAG_OVERRIDES, null, 0); }

  async function restoreFromText(raw){
    let tags = [];
    raw = (raw||'').trim();
    if(!raw) { alert("Il n'y a rien à restaurer : le champ est vide."); return; }
    if(raw.startsWith('<')){
      alert("Ce texte est du HTML (probablement le site lui-même), pas une sauvegarde. Colle plutôt le texte obtenu avec « Copier ma sauvegarde »/« Afficher le texte à copier à la main ».");
      return;
    }
    try{
      const data = JSON.parse(raw);
      tags = Object.keys(data).filter(t=>TEAMS[t]);
      tags.forEach(t=>{ FLAG_OVERRIDES[t] = data[t]; });
      refreshFlagSymbols();
      await Promise.all(tags.map(rasterizeFlag));
      saveFlagCacheToStorage();
      renderAll();
      renderFlagEditorView();
    }catch(err){
      alert("Ce texte ne semble pas être une sauvegarde valide (JSON illisible). Vérifie que tu as bien copié tout le texte, sans rien couper au début ou à la fin.");
      return;
    }
    alert(`${tags.length} drapeau(x) restauré(s) sur le site pour cette session. Tentative de sauvegarde en ligne en arrière-plan...`);
    let blocked = false;
    for(const t of tags){
      if(blocked){ PENDING_SYNC.add(t); continue; }
      try{ await SB_STORAGE.set('flag_override:'+t, FLAG_OVERRIDES[t]); PENDING_SYNC.delete(t); }

  // -- multi-image helpers: every op re-scans the textarea fresh so indices stay correct --
  function getAllImageMatches(){
    const code = document.getElementById('editorTextarea').value;
    const re = /<image[^>]*\/?>/g;
    let m, out=[];
    while((m = re.exec(code))) out.push({tag:m[0], index:m.index});
    return out;
  }
  function getAttrsFromTag(tag){
    const attrs = {x:0,y:0,width:30,height:20};
    Object.keys(attrs).forEach(a=>{
      const mm = tag.match(new RegExp(a+'="([^"]*)"'));
      if(mm) attrs[a] = parseFloat(mm[1]);
    });
    attrs.stretch = /preserveAspectRatio="none"/.test(tag);
    return attrs;
  }
  function setAttrsOnTag(tag, newAttrs){
    let t = tag;
    ['x','y','width','height'].forEach(a=>{
      if(newAttrs[a]===undefined) return;
      const v = newAttrs[a].toFixed(2);
      if(new RegExp(a+'="[^"]*"').test(t)) t = t.replace(new RegExp(a+'="[^"]*"'), `${a}="${v}"`);
      else t = t.replace('<image', `<image ${a}="${v}"`);
    });
    if(newAttrs.stretch!==undefined){
      const value = newAttrs.stretch ? 'none' : 'xMidYMid slice';
      if(/preserveAspectRatio="[^"]*"/.test(t)) t = t.replace(/preserveAspectRatio="[^"]*"/, `preserveAspectRatio="${value}"`);
      else t = t.replace('<image', `<image preserveAspectRatio="${value}"`);
    }
    return t;
  }
  function replaceImageAt(idx, newTag){
    const matches = getAllImageMatches();
    if(!matches[idx]) return;
    const ta = document.getElementById('editorTextarea');
    const code = ta.value;
    const m = matches[idx];
    ta.value = code.slice(0,m.index) + newTag + code.slice(m.index+m.tag.length);
  }
  function removeImageAt(idx){
    replaceImageAt(idx, '');
    updateEditorPreview();
    renderImagePanels();
  }
  function applySlidersFor(idx){
    const zoomEl = document.getElementById('imgZoom_'+idx), offXEl=document.getElementById('imgOffX_'+idx), offYEl=document.getElementById('imgOffY_'+idx), stretchEl=document.getElementById('imgStretch_'+idx);
    const zoom = Number(zoomEl.value)/100, offX = Number(offXEl.value), offY = Number(offYEl.value);
    const width = 30*zoom, height = 20*zoom;
    const x = (30-width)/2+offX, y=(20-height)/2+offY;
    document.getElementById('imgZoomVal_'+idx).textContent = Math.round(zoom*100)+'%';
    const matches = getAllImageMatches();
    if(!matches[idx]) return;
    const newTag = setAttrsOnTag(matches[idx].tag, {x,y,width,height,stretch:stretchEl.checked});
    replaceImageAt(idx, newTag);
    updateEditorPreview();
  }
  function distributeSideBySide(){
    const matches = getAllImageMatches();
    const n = matches.length;
    if(n<2) return;
    for(let i=0;i<n;i++){
      const cur = getAllImageMatches();
      if(!cur[i]) continue;
      const newTag = setAttrsOnTag(cur[i].tag, {x:i*(30/n), y:0, width:30/n, height:20, stretch:true});
      replaceImageAt(i, newTag);
    }
    updateEditorPreview();
    renderImagePanels();
  }
  function renderImagePanels(){
    const container = document.getElementById('editorImagePanels');
    const matches = getAllImageMatches();
    if(matches.length===0){ container.innerHTML=''; return; }
    let html = '';
    if(matches.length>1){
      html += `<div style="margin-bottom:10px;"><button class="ghost" id="editorDistributeBtn">↔ Répartir les ${matches.length} images côte à côte</button></div>`;
    }
    matches.forEach((m,idx)=>{
      const a = getAttrsFromTag(m.tag);
      const zoom = Math.round(Math.min(400,Math.max(30, a.width/30*100)));
      const offX = Math.round(Math.min(30,Math.max(-30, a.x-(30-a.width)/2)));
      const offY = Math.round(Math.min(20,Math.max(-20, a.y-(20-a.height)/2)));
      html += `<div class="editor-toolbar" style="margin-bottom:10px;padding:12px;background:var(--panel-3);border-radius:8px;border:1px solid var(--line-strong);flex-direction:column;align-items:stretch;gap:8px;">
        <div style="font-size:12px;color:var(--gold);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;">
          <span>Image ${idx+1}${matches.length>1?'':''}</span>
          <button class="ghost" data-rm="${idx}" style="padding:2px 8px;">✕ retirer</button>
        </div>
        <label style="font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;">Zoom
          <input type="range" id="imgZoom_${idx}" min="30" max="400" value="${zoom}" style="flex:1;">
          <span id="imgZoomVal_${idx}" class="mono" style="width:42px;">${zoom}%</span>
        </label>
        <label style="font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;">Horizontal
          <input type="range" id="imgOffX_${idx}" min="-30" max="30" value="${offX}" style="flex:1;">
        </label>
        <label style="font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;">Vertical
          <input type="range" id="imgOffY_${idx}" min="-20" max="20" value="${offY}" style="flex:1;">
        </label>
        <label style="font-size:12px;color:var(--cream);display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="imgStretch_${idx}" ${a.stretch?'checked':''}>
          Déformer pour remplir sans recadrer
        </label>
        <div><button class="ghost" data-center="${idx}">Recentrer / remplir sa zone</button></div>
      </div>`;
    });
    container.innerHTML = html;
    matches.forEach((m,idx)=>{
      ['imgZoom_'+idx,'imgOffX_'+idx,'imgOffY_'+idx].forEach(id=> document.getElementById(id).addEventListener('input', ()=>applySlidersFor(idx)));
      document.getElementById('imgStretch_'+idx).addEventListener('change', ()=>applySlidersFor(idx));
    });
    container.querySelectorAll('[data-rm]').forEach(b=> b.onclick = ()=> removeImageAt(Number(b.dataset.rm)));
    container.querySelectorAll('[data-center]').forEach(b=> b.onclick = ()=>{
      const idx = Number(b.dataset.center);
      document.getElementById('imgZoom_'+idx).value=100;
      document.getElementById('imgOffX_'+idx).value=0;
      document.getElementById('imgOffY_'+idx).value=0;
      applySlidersFor(idx);
    });
    const distBtn = document.getElementById('editorDistributeBtn');
    if(distBtn) distBtn.onclick = distributeSideBySide;
  }

  function checkImageQuality(src){
    const err = document.getElementById('editorError');
    const probe = new Image();
    probe.onload = ()=>{
      if((probe.naturalWidth < 180 || probe.naturalHeight < 120) && err){
        err.textContent = `⚠️ Image petite (${probe.naturalWidth}×${probe.naturalHeight}px) : elle risque de devenir floue/pixelisée une fois agrandie dans le cadre. Cherche si possible une image plus grande du drapeau (ex: "drapeau [pays] png" sur le web, ou Wikipédia).`;
      }
    };
    probe.onerror = ()=>{};
    probe.src = src;
  }
  document.getElementById('editorUploadBtn').onclick = ()=> document.getElementById('editorFileInput').click();
  document.getElementById('editorFileInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const err = document.getElementById('editorError');
    if(file.size > 3*1024*1024 && err){ err.textContent = "Image assez lourde (>3 Mo) : ça peut ralentir la sauvegarde. Une image plus légère fonctionnera mieux."; }
    const reader = new FileReader();
    reader.onload = ()=>{ addImage(reader.result); checkImageQuality(reader.result); };
    reader.onerror = ()=>{ if(err) err.textContent = "Impossible de lire ce fichier."; };
    reader.readAsDataURL(file);
    e.target.value = '';
  });
  document.getElementById('editorUrlBtn').onclick = ()=>{
    const url = document.getElementById('editorUrlInput').value.trim();
    if(url){ addImage(url); checkImageQuality(url); }
    document.getElementById('editorUrlInput').value = '';
  };
  renderImagePanels();

  document.getElementById('editorResetBtn').onclick = async ()=>{
    await deleteFlagOverride(editorTag);
    renderAll();
    renderFlagEditorView();
  };
  document.getElementById('editorDefaultBtn').onclick = ()=>{
    document.getElementById('editorTextarea').value = buildFlagInner(editorTag).replace(/></g,'>\n<');
    updateEditorPreview();
    renderImagePanels();
  };
  document.getElementById('editorSaveBtn').onclick = async ()=>{
    const err = document.getElementById('editorError');
    const btn = document.getElementById('editorSaveBtn');
    const content = currentEditorSVG();
    if(err) err.textContent = '';

    // Apply immediately in this session — never blocked by server issues, nothing is lost.
    FLAG_OVERRIDES[editorTag] = content;
    refreshFlagSymbols();
    await rasterizeFlag(editorTag);
    saveFlagCacheToStorage();
    renderAll();
    const badge = document.querySelector('.editor-badge');
    if(badge){ badge.textContent = '✓ version personnalisée'; badge.className='editor-badge custom'; }

    btn.disabled = true; btn.textContent = 'Sauvegarde en ligne...';
    try{
      await SB_STORAGE.set('flag_override:'+editorTag, content);
      PENDING_SYNC.delete(editorTag);
      const note = document.getElementById('editorSaveNote');
      if(note){ note.textContent = 'Enregistré ✓'; note.classList.add('show'); setTimeout(()=>note.classList.remove('show'), 1800); }
    }catch(e){
      PENDING_SYNC.add(editorTag);
      if(err){
        if(/rate limit/i.test(e.message||'')){
          err.textContent = "✓ Appliqué sur le site pour cette session — la sauvegarde en ligne, elle, est temporairement limitée par la plateforme. Continue à travailler normalement (rien n'est perdu), exporte une sauvegarde de temps en temps, et utilise le bouton ↻ ci-dessous plus tard pour resynchroniser.";
        } else {
          err.textContent = "Appliqué sur cette session, mais échec de la sauvegarde en ligne : " + e.message;
        }
      }
    }finally{
      btn.disabled = false; btn.textContent = 'Enregistrer ce drapeau';
      renderFlagEditorView();
    }
  };
}
let adminUnlocked = false;
let adminSection = 'quali';
let adminGroup = 'W';

function trackOptions(selected){
  return `<option value="">—</option>` + TRACKS.map(tr=>`<option value="${tr.id}" ${selected===tr.id?'selected':''}>${tr[LANG]}</option>`).join('');
}
function trackSelectorRowHTML(key, tracks, disabled, dataAttr){
  dataAttr = dataAttr || 'pmatch';
  const cols = Array.from({length:12}, (_,r)=>r);
  return `<div class="amr-race-wrap">
    <table class="amr-race-table amr-track-table">
      <tbody><tr>
        <td class="amr-race-name" style="color:var(--dim);font-size:11px;">${t('adminTrackLabel')}</td>
        ${cols.map(r=>`<td><select class="amr-track-select" data-${dataAttr}-track="${key}" data-race="${r}" ${disabled}>${trackOptions(tracks?tracks[r]:'')}</select></td>`).join('')}
        <td></td>
      </tr></tbody>
    </table>
  </div>`;
}
function raceTableHTML(key, side, players, teamTag, disabled, dataAttr){
  dataAttr = dataAttr || 'pmatch';
  const cols = Array.from({length:12}, (_,r)=>r);
  return `<div class="amr-race-wrap">
    <table class="amr-race-table">
      <thead><tr>
        <th class="amr-race-name">${teamTag?teamName(teamTag):'—'}</th>
        ${cols.map(r=>`<th>R${r+1}</th>`).join('')}
        <th>${t('adminTotalLabel')}</th>
        <th class="amr-race-name">${t('adminSubLabel')}</th>
        <th>${t('adminSubFromLabel')}</th>
        <th>${t('adminSubToLabel')}</th>
      </tr></thead>
      <tbody>
        ${players.map((p,pi)=>{
          const racesFilled = playerRacesFilled(p);
          const totalVal = racesFilled ? playerTotal(p) : (playerHasTypedTotal(p) ? Number(p.total) : '');
          return `<tr>
          <td class="amr-race-name"><select data-${dataAttr}="${key}" data-pside="${side}" data-pidx="${pi}" data-field="name" ${disabled}>${playerOptions(teamTag, p.n)}</select></td>
          ${cols.map(r=>`<td><input type="number" class="race-input" data-${dataAttr}="${key}" data-pside="${side}" data-pidx="${pi}" data-race="${r}" value="${p.races?p.races[r]:''}" ${disabled}></td>`).join('')}
          <td><input type="number" class="race-total-input ${racesFilled?'is-auto':''}" data-${dataAttr}-total="${key}" data-pside="${side}" data-pidx="${pi}" value="${totalVal}" title="${racesFilled?'Total calculé depuis les 12 courses':'Total du match (saisis-le, ou remplis les courses)'}" ${racesFilled?'readonly':''} ${disabled}></td>
          <td class="amr-race-name"><select data-${dataAttr}-sub="${key}" data-pside="${side}" data-pidx="${pi}" ${disabled}>${playerOptions(teamTag, p.subName, true)}</select></td>
          <td><input type="number" min="1" max="12" class="sub-from-input" data-${dataAttr}-subfrom="${key}" data-pside="${side}" data-pidx="${pi}" value="${p.subFromRace||''}" placeholder="—" ${disabled}></td>
          <td><input type="number" min="1" max="12" class="sub-from-input" data-${dataAttr}-subto="${key}" data-pside="${side}" data-pidx="${pi}" value="${p.subToRace||''}" placeholder="fin" ${disabled}></td>
        </tr>`;}).join('')}
      </tbody>
    </table>
  </div>`;
}
function playerOptions(tag, selected){
  if(!tag) return `<option value="">—</option>`;
  const players = roster(tag);
  return `<option value="">— joueur —</option>` + players.map(p=>`<option value="${p.n}" ${selected===p.n?'selected':''}>${p.n}</option>`).join('');
}

function renderAdminView(){
  const el = document.getElementById('view-admin');
  if(!adminUnlocked){
    el.innerHTML = `<div class="admin-gate">
      <h2 class="outline">Accès admin</h2>
      <p>Connecte-toi pour saisir les résultats. Ces données seront visibles par tout le monde.</p>
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
      <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password">
      <button class="primary" id="loginSubmit">Se connecter</button>
      <p id="loginError" style="color:var(--red);display:none;"></p>
    </div>`;
    const doLogin = async ()=>{
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginSubmit');
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Connexion...';
      try{
        await loginAdmin(email, password);
        adminUnlocked = true;
        renderAdminView();
      }catch(e){
        errEl.textContent = 'Email ou mot de passe incorrect.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Se connecter';
      }
    };
    document.getElementById('loginSubmit').onclick = doLogin;
    document.getElementById('loginPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    return;
  }

  const sections = [
    {id:'quali', label:'Qualification'},
    {id:'top', label:'Groupes A/B'},
    {id:'mid', label:'Groupes 1-4'},
    {id:'bracket', label:'Bracket'},
  ];
  let html = `<div class="admin-panel">
    <div class="admin-select-row">
      ${sections.map(s=>`<button class="chip ${adminSection===s.id?'active':''}" data-sec="${s.id}">${s.label}</button>`).join('')}
      <button class="chip" id="adminFlagsBtn">🎨 Drapeaux</button>
    </div>
    <div class="editor-toolbar" style="margin-bottom:16px;padding:12px;background:var(--panel-3);border-radius:8px;border:1px solid var(--gold);flex-direction:column;align-items:stretch;gap:10px;">
      <span style="font-size:12px;color:var(--gold);font-family:'JetBrains Mono',monospace;">⚠️ Sauvegarde de secours des scores et joueurs (recommandé) :</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button id="stateExportBtn">📋 Copier ma sauvegarde des scores</button>
        <button id="stateShowExportBtn" class="ghost">Afficher le texte à copier à la main</button>
        <span style="font-size:11px;color:var(--dim);">Colle ensuite ce texte dans un fichier texte et garde-le précieusement, en plus de la sauvegarde en ligne.</span>
      </div>
      <textarea id="stateExportArea" class="editor-textarea" style="display:none;min-height:120px;" readonly></textarea>
      <div style="height:1px;background:var(--line-strong);margin:4px 0;"></div>
      <span style="font-size:12px;color:var(--gold);font-family:'JetBrains Mono',monospace;">Pour restaurer :</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button id="statePasteBtn">📋 Coller depuis le presse-papiers</button>
        <span style="font-size:11px;color:var(--dim);">...ou colle directement ton texte de sauvegarde ici :</span>
      </div>
      <textarea id="stateImportArea" class="editor-textarea" style="min-height:100px;" placeholder="Colle ici le texte de ta sauvegarde des scores (Ctrl+V / Cmd+V), puis clique sur Restaurer."></textarea>
      <div><button id="stateRestoreBtn" class="primary">Restaurer depuis ce texte</button></div>
    </div>`;

  if(adminSection==='quali' || adminSection==='top' || adminSection==='mid'){
    const groupsObj = adminSection==='quali'?QUALI_GROUPS:(adminSection==='top'?TOP_GROUPS:MID_GROUPS);
    const groupIds = Object.keys(groupsObj);
    if(!groupIds.includes(adminGroup)) adminGroup = groupIds[0];
    html += `<div class="admin-select-row">${groupIds.map(id=>`<button class="chip ${adminGroup===id?'active':''}" data-grp="${id}">Groupe ${id}</button>`).join('')}</div>`;

    const stateGroup = adminSection==='quali'?STATE.quali[adminGroup]:(adminSection==='top'?STATE.top[adminGroup]:STATE.mid[adminGroup]);

    if(adminSection==='mid'){
      html += `<div class="helptext">Assigne les équipes qualifiées aux deux places restantes (${MID_GROUPS[adminGroup].hint}), puis saisis les scores.</div>`;
      [2,3].forEach(idx=>{
        html += `<div class="admin-match-row"><span style="width:90px;color:var(--dim);font-size:12px;">Place ${idx+1}</span>
          <select class="team-select" data-slot="${idx}">
            <option value="">— à définir —</option>
            ${Object.keys(TEAMS).sort((a,b)=>teamName(a).localeCompare(teamName(b))).map(t=>`<option value="${t}" ${stateGroup.slots[idx]===t?'selected':''}>${teamName(t)}</option>`).join('')}
          </select></div>`;
      });
    }

    html += `<div class="helptext">Pour chaque match : sélectionne les 6 joueurs de chaque équipe, puis leur score à chacune des 12 courses. Le total par joueur et le score d'équipe se calculent tout seuls.</div>`;
    pairsFor(stateGroup.slots.length).forEach(([i,j])=>{
      const h = stateGroup.slots[i], a = stateGroup.slots[j];
      const key = i+'-'+j;
      const pl = stateGroup.players[key] || emptyMatchPlayers();
      const disabled = (h==null || a==null) ? 'disabled' : '';
      const totalH = pl.h.reduce((sum,p)=> sum + playerTotal(p), 0);
      const totalA = pl.a.reduce((sum,p)=> sum + playerTotal(p), 0);
      html += `<div class="admin-match-full">
        <div class="amr-header">
          <span class="team-select">${h?teamName(h):'—'}</span>
          <span class="amr-total" id="total-${key}-0">${totalH}</span>
          <span class="vs">vs</span>
          <span class="amr-total" id="total-${key}-1">${totalA}</span>
          <span class="team-select" style="text-align:right;">${a?teamName(a):'—'}</span>
        </div>
        ${streamInputRowHTML(streamRefFor(adminSection, adminGroup, key), disabled)}
        ${forfeitRowHTML(streamRefFor(adminSection, adminGroup, key), h, a, disabled)}
        ${trackSelectorRowHTML(key, pl.tracks, disabled)}
        ${raceTableHTML(key, 0, pl.h, h, disabled)}
        ${raceTableHTML(key, 1, pl.a, a, disabled)}
      </div>`;
    });
  }

  if(adminSection==='bracket'){
    html += `<div class="helptext">Round de 16 : assigne les 16 équipes qualifiées. Les tours suivants se remplissent automatiquement avec les vainqueurs.</div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:20px;">`;
    for(let i=0;i<16;i++){
      html += `<div><label style="font-size:11px;color:var(--dim);">Place ${i+1}</label>
        <select class="team-select" data-bslot="${i}" style="width:100%;">
          <option value="">— à définir —</option>
          ${Object.keys(TEAMS).sort((a,b)=>teamName(a).localeCompare(teamName(b))).map(t=>`<option value="${t}" ${STATE.bracket.slots[i]===t?'selected':''}>${teamName(t)}</option>`).join('')}
        </select></div>`;
    }
    html += `</div>`;

    const {rounds, roundScores} = deriveBracketRounds();
    for(let r=0;r<4;r++){
      html += `<div class="helptext" style="margin-top:10px;"><strong style="color:var(--cream)">${ROUND_NAMES_F()[r]}</strong></div>`;
      const slots = rounds[r];
      for(let m=0;m<slots.length/2;m++){
        const h=slots[m*2], a=slots[m*2+1];
        const pl = (STATE.bracket.players['r'+r]||{})[m] || emptyMatchPlayers();
        const disabled = (h==null||a==null)?'disabled':'';
        const bkey = `${r}-${m}`;
        const totalH = pl.h.reduce((sum,p)=> sum + playerTotal(p), 0);
        const totalA = pl.a.reduce((sum,p)=> sum + playerTotal(p), 0);
        html += `<div class="admin-match-full">
          <div class="amr-header">
            <span class="team-select">${h?teamName(h):'—'}</span>
            <span class="amr-total" id="btotal-${bkey}-0">${totalH}</span>
            <span class="vs">vs</span>
            <span class="amr-total" id="btotal-${bkey}-1">${totalA}</span>
            <span class="team-select" style="text-align:right;">${a?teamName(a):'—'}</span>
          </div>
          ${streamInputRowHTML(streamRefFor('bracket', r, m), disabled)}
          ${forfeitRowHTML(streamRefFor('bracket', r, m), h, a, disabled)}
          ${trackSelectorRowHTML(bkey, pl.tracks, disabled, 'bpmatch')}
          ${raceTableHTML(bkey, 0, pl.h, h, disabled, 'bpmatch')}
          ${raceTableHTML(bkey, 1, pl.a, a, disabled, 'bpmatch')}
        </div>`;
      }
    }
  }

  html += `<div><button class="primary" id="saveBtn">Enregistrer</button><span class="save-note" id="saveNote">Enregistré ✓</span> <button class="ghost" id="lockBtn" style="float:right;">Verrouiller l'admin</button></div>`;
  html += `<div id="adminSaveError" style="color:var(--red);font-size:12px;margin-top:6px;"></div>`;
  html += `</div>`;
  el.innerHTML = html;

  el.querySelectorAll('[data-sec]').forEach(b=> b.onclick = ()=>{ adminSection=b.dataset.sec; renderAdminView(); });
  // Forfeit buttons: update STATE.forfeits + the match score right away, then save.
  el.querySelectorAll('.admin-forfeit-row').forEach(rowEl=>{
    const ref = rowEl.dataset.forfeitRef;
    rowEl.querySelectorAll('[data-forfeit-set]').forEach(btn=>{
      btn.onclick = ()=>{
        const side = btn.dataset.forfeitSet; // 'H' | 'A' | '' (clear)
        if(side==='H' || side==='A'){
          if(!confirm("Déclarer forfait : le match sera marqué 150–0 et NON joué. Les scores de joueurs déjà saisis pour ce match seront effacés. Continuer ?")) return;
        }
        if(!STATE.forfeits || typeof STATE.forfeits !== 'object') STATE.forfeits = {};
        if(side==='H' || side==='A') STATE.forfeits[ref] = side;
        else delete STATE.forfeits[ref];
        applyForfeitToScore(ref, side==='H'||side==='A' ? side : null);
        renderAll();
        renderAdminView();
        saveState().catch(()=>{
          const err = document.getElementById('adminSaveError');
          if(err) err.textContent = "⚠️ Sauvegarde en ligne échouée pour le forfait. Réessaie en réenregistrant.";
        });
      };
    });
  });
  const flagsBtn = document.getElementById('adminFlagsBtn');
  if(flagsBtn) flagsBtn.onclick = ()=>{
    setView('flageditor');
    renderFlagEditorView();
    // The editor is the admin's working tool: pull the live Supabase drafts (which
    // may be ahead of the last published flags.json) so edits in progress aren't lost from view.
    loadFlagOverrides().then(()=>{ refreshFlagSymbols(); renderFlagEditorView(); }).catch(()=>{});
  };

  function stateBackupText(){ return JSON.stringify(STATE, null, 0); }
  document.getElementById('stateExportBtn').onclick = async ()=>{
    const text = stateBackupText();
    try{
      await navigator.clipboard.writeText(text);
      alert("Sauvegarde des scores copiée dans le presse-papiers ✓\n\nColle-la maintenant (Ctrl+V / Cmd+V) dans un fichier texte et enregistre-le pour la garder précieusement.");
    }catch(err){
      const area = document.getElementById('stateExportArea');
      area.style.display = 'block';
      area.value = text;
      area.focus(); area.select();
      alert("Impossible de copier automatiquement. Le texte est affiché ci-dessous : sélectionne-le et copie-le manuellement (Ctrl+C / Cmd+C).");
    }
  };
  document.getElementById('stateShowExportBtn').onclick = ()=>{
    const area = document.getElementById('stateExportArea');
    const show = area.style.display==='none';
    area.style.display = show ? 'block' : 'none';
    if(show){ area.value = stateBackupText(); area.focus(); area.select(); }
  };
  document.getElementById('statePasteBtn').onclick = async ()=>{
    try{
      const text = await navigator.clipboard.readText();
      document.getElementById('stateImportArea').value = text;
    }catch(err){
      alert("Impossible de lire le presse-papiers automatiquement (autorisation refusée par le navigateur). Colle manuellement (Ctrl+V / Cmd+V) dans le champ ci-dessous.");
    }
  };
  document.getElementById('stateRestoreBtn').onclick = async ()=>{
    const raw = (document.getElementById('stateImportArea').value || '').trim();
    if(!raw){ alert("Il n'y a rien à restaurer : le champ est vide."); return; }
    if(raw.startsWith('<')){
      alert("Ce texte est du HTML (probablement le site lui-même), pas une sauvegarde. Colle plutôt le texte obtenu avec « Copier ma sauvegarde des scores »/« Afficher le texte à copier à la main ».");
      return;
    }
    let parsed;
    try{ parsed = JSON.parse(raw); }
    catch(err){ alert("Ce texte ne semble pas être une sauvegarde valide (JSON illisible). Vérifie que tu as bien copié tout le texte, sans rien couper au début ou à la fin."); return; }
    if(!parsed || !parsed.quali || !parsed.mid || !parsed.top || !parsed.bracket){
      alert("Ce texte ne ressemble pas à une sauvegarde de scores valide (structure inattendue).");
      return;
    }
    if(!confirm("Ceci va remplacer TOUS les scores, joueurs et places actuellement enregistrés sur le site par ceux de cette sauvegarde. Continuer ?")) return;
    STATE = parsed;
    if(!STATE.streams || typeof STATE.streams !== 'object') STATE.streams = {};
    if(!STATE.forfeits || typeof STATE.forfeits !== 'object') STATE.forfeits = {};
    renderAll();
    renderAdminView();
    alert("Scores restaurés pour cette session. Tentative de sauvegarde en ligne en arrière-plan...");
    saveState().catch(()=> alert("⚠️ La sauvegarde en ligne a échoué — vérifie ta connexion. Les données restaurées restent visibles ici en attendant."));
  };
  el.querySelectorAll('[data-grp]').forEach(b=> b.onclick = ()=>{ adminGroup=b.dataset.grp; renderAdminView(); });
  const lockBtn = document.getElementById('lockBtn');
  if(lockBtn) lockBtn.onclick = ()=>{ adminUnlocked=false; authToken=null; refreshToken=null; renderAdminView(); };
  const saveBtn = document.getElementById('saveBtn');
  if(saveBtn) saveBtn.onclick = async ()=>{
    // Live-stream links (present in both group and bracket sections)
    if(!STATE.streams || typeof STATE.streams !== 'object') STATE.streams = {};
    el.querySelectorAll('[data-stream]').forEach(field=>{
      const ref = field.dataset.stream;
      const url = (field.value || '').trim();
      if(url) STATE.streams[ref] = url;
      else delete STATE.streams[ref]; // empty = no stream, keep STATE.streams tidy
    });
    if(adminSection==='mid'){
      el.querySelectorAll('[data-slot]').forEach(sel=>{
        const idx = Number(sel.dataset.slot);
        STATE.mid[adminGroup].slots[idx] = sel.value || null;
      });
    }
    if(adminSection==='bracket'){
      el.querySelectorAll('[data-bslot]').forEach(sel=>{
        const idx = Number(sel.dataset.bslot);
        STATE.bracket.slots[idx] = sel.value || null;
      });
    }
    if(adminSection==='quali' || adminSection==='top' || adminSection==='mid'){
      const stateGroup = adminSection==='quali'?STATE.quali[adminGroup]:(adminSection==='top'?STATE.top[adminGroup]:STATE.mid[adminGroup]);
      el.querySelectorAll('[data-pmatch]').forEach(field=>{
        const key = field.dataset.pmatch, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!stateGroup.players[key]) stateGroup.players[key] = emptyMatchPlayers();
        const slot = side===0 ? stateGroup.players[key].h : stateGroup.players[key].a;
        if(!Array.isArray(slot[pidx].races)) migratePlayerSlot(slot[pidx]); // safety net for any old-shaped data we haven't seen yet
        if(field.tagName==='SELECT') slot[pidx].n = field.value;
        else slot[pidx].races[Number(field.dataset.race)] = field.value;
      });
      el.querySelectorAll('[data-pmatch-total]').forEach(field=>{
        const key = field.dataset.pmatchTotal, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!stateGroup.players[key]) stateGroup.players[key] = emptyMatchPlayers();
        const slot = side===0 ? stateGroup.players[key].h : stateGroup.players[key].a;
        // Only keep a hand-typed total; when races are filled they take over and the
        // stored total is cleared so it can't linger as stale data.
        slot[pidx].total = playerRacesFilled(slot[pidx]) ? '' : field.value;
      });
      el.querySelectorAll('[data-pmatch-sub]').forEach(field=>{
        const key = field.dataset.pmatchSub, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!stateGroup.players[key]) stateGroup.players[key] = emptyMatchPlayers();
        const slot = side===0 ? stateGroup.players[key].h : stateGroup.players[key].a;
        slot[pidx].subName = field.value;
      });
      el.querySelectorAll('[data-pmatch-subfrom]').forEach(field=>{
        const key = field.dataset.pmatchSubfrom, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!stateGroup.players[key]) stateGroup.players[key] = emptyMatchPlayers();
        const slot = side===0 ? stateGroup.players[key].h : stateGroup.players[key].a;
        slot[pidx].subFromRace = field.value;
      });
      el.querySelectorAll('[data-pmatch-subto]').forEach(field=>{
        const key = field.dataset.pmatchSubto, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!stateGroup.players[key]) stateGroup.players[key] = emptyMatchPlayers();
        const slot = side===0 ? stateGroup.players[key].h : stateGroup.players[key].a;
        slot[pidx].subToRace = field.value;
      });
      el.querySelectorAll('[data-pmatch-track]').forEach(field=>{
        const key = field.dataset.pmatchTrack;
        if(!stateGroup.players[key]) stateGroup.players[key] = emptyMatchPlayers();
        if(!stateGroup.players[key].tracks) stateGroup.players[key].tracks = Array(12).fill('');
        stateGroup.players[key].tracks[Number(field.dataset.race)] = field.value;
      });
      // team totals are derived from the 12 individual scores, never typed directly —
      // except a forfeited match, which is forced to 150-0 for the non-forfeiting side.
      pairsFor(stateGroup.slots.length).forEach(([i,j])=>{
        const key = i+'-'+j;
        const ref = streamRefFor(adminSection, adminGroup, key);
        const ffSide = forfeitSideFor(ref);
        if(ffSide){ stateGroup.scores[key] = ffSide==='H' ? ['0','150'] : ['150','0']; return; }
        const pl = stateGroup.players[key];
        if(!pl){ if(stateGroup.scores[key]) stateGroup.scores[key] = ['','']; return; }
        const totalH = pl.h.reduce((sum,p)=> sum + (p.n ? effectivePlayerTotal(p) : 0), 0);
        const totalA = pl.a.reduce((sum,p)=> sum + (p.n ? effectivePlayerTotal(p) : 0), 0);
        const anyFilled = pl.h.some(p=>p.n && playerHasScore(p)) || pl.a.some(p=>p.n && playerHasScore(p));
        stateGroup.scores[key] = anyFilled ? [String(totalH), String(totalA)] : ['',''];
      });
    }
    if(adminSection==='bracket'){
      el.querySelectorAll('[data-bpmatch]').forEach(field=>{
        const [r,m] = field.dataset.bpmatch.split('-');
        const rk = 'r'+r, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!STATE.bracket.players[rk][m]) STATE.bracket.players[rk][m] = emptyMatchPlayers();
        const slot = side===0 ? STATE.bracket.players[rk][m].h : STATE.bracket.players[rk][m].a;
        if(!Array.isArray(slot[pidx].races)) migratePlayerSlot(slot[pidx]); // safety net for any old-shaped data we haven't seen yet
        if(field.tagName==='SELECT') slot[pidx].n = field.value;
        else slot[pidx].races[Number(field.dataset.race)] = field.value;
      });
      el.querySelectorAll('[data-bpmatch-total]').forEach(field=>{
        const [r,m] = field.dataset.bpmatchTotal.split('-');
        const rk = 'r'+r, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!STATE.bracket.players[rk][m]) STATE.bracket.players[rk][m] = emptyMatchPlayers();
        const slot = side===0 ? STATE.bracket.players[rk][m].h : STATE.bracket.players[rk][m].a;
        slot[pidx].total = playerRacesFilled(slot[pidx]) ? '' : field.value;
      });
      el.querySelectorAll('[data-bpmatch-sub]').forEach(field=>{
        const [r,m] = field.dataset.bpmatchSub.split('-');
        const rk = 'r'+r, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!STATE.bracket.players[rk][m]) STATE.bracket.players[rk][m] = emptyMatchPlayers();
        const slot = side===0 ? STATE.bracket.players[rk][m].h : STATE.bracket.players[rk][m].a;
        slot[pidx].subName = field.value;
      });
      el.querySelectorAll('[data-bpmatch-subfrom]').forEach(field=>{
        const [r,m] = field.dataset.bpmatchSubfrom.split('-');
        const rk = 'r'+r, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!STATE.bracket.players[rk][m]) STATE.bracket.players[rk][m] = emptyMatchPlayers();
        const slot = side===0 ? STATE.bracket.players[rk][m].h : STATE.bracket.players[rk][m].a;
        slot[pidx].subFromRace = field.value;
      });
      el.querySelectorAll('[data-bpmatch-subto]').forEach(field=>{
        const [r,m] = field.dataset.bpmatchSubto.split('-');
        const rk = 'r'+r, side = Number(field.dataset.pside), pidx = Number(field.dataset.pidx);
        if(!STATE.bracket.players[rk][m]) STATE.bracket.players[rk][m] = emptyMatchPlayers();
        const slot = side===0 ? STATE.bracket.players[rk][m].h : STATE.bracket.players[rk][m].a;
        slot[pidx].subToRace = field.value;
      });
      el.querySelectorAll('[data-bpmatch-track]').forEach(field=>{
        const [r,m] = field.dataset.bpmatchTrack.split('-');
        const rk = 'r'+r;
        if(!STATE.bracket.players[rk][m]) STATE.bracket.players[rk][m] = emptyMatchPlayers();
        if(!STATE.bracket.players[rk][m].tracks) STATE.bracket.players[rk][m].tracks = Array(12).fill('');
        STATE.bracket.players[rk][m].tracks[Number(field.dataset.race)] = field.value;
      });
      for(let r=0;r<4;r++){
        const rk = 'r'+r;
        Object.keys(STATE.bracket.players[rk]||{}).forEach(m=>{
          const ref = streamRefFor('bracket', r, m);
          const ffSide = forfeitSideFor(ref);
          if(ffSide){ STATE.bracket.scores[rk][m] = ffSide==='H' ? ['0','150'] : ['150','0']; return; }
          const pl = STATE.bracket.players[rk][m];
          const totalH = pl.h.reduce((sum,p)=> sum + (p.n ? effectivePlayerTotal(p) : 0), 0);
          const totalA = pl.a.reduce((sum,p)=> sum + (p.n ? effectivePlayerTotal(p) : 0), 0);
          const anyFilled = pl.h.some(p=>p.n && playerHasScore(p)) || pl.a.some(p=>p.n && playerHasScore(p));
          STATE.bracket.scores[rk][m] = anyFilled ? [String(totalH), String(totalA)] : ['',''];
        });
      }
    }
    // Update the screen immediately — the data is already in memory, no need to wait on the network.
    renderAll();
    renderAdminView();
    const note = document.getElementById('saveNote');
    if(note){ note.classList.add('show'); setTimeout(()=>note.classList.remove('show'), 1800); }
    // Save to Supabase in the background; only bother the user if it actually fails.
    saveState().catch(()=>{
      const err = document.getElementById('adminSaveError');
      if(err) err.textContent = "⚠️ Sauvegarde en ligne échouée. Si ta session a expiré, verrouille l'admin (bouton ci-dessous) puis reconnecte-toi, et enregistre à nouveau — tes changements restent visibles ici en attendant.";
    });
  };
}

/* =========================================================
   NAV
========================================================= */
function HERO_INFO_F(){ return {
  home: {title:t('heroTitleMain'), sub:t('heroSubMain')},
  standings: {title:t('heroTitleStandings'), sub:t('heroSubStandings')},
  calendar: {title:t('heroTitleCalendar'), sub:t('heroSubCalendar')},
  teams: {title:t('heroTitleTeams'), sub:t('heroSubTeams')},
  players: {title:t('heroTitlePlayers'), sub:t('heroSubPlayers')},
  flageditor: {title:t('heroTitleFlags'), sub:t('heroSubFlags')},
  admin: {title:t('heroTitleAdmin'), sub:t('heroSubAdmin')},
};}
let selectedMatch = null;
let selectedPlayer = null; // {tag, name}
function updateHero(view){
  const HERO_INFO = HERO_INFO_F();
  let info = HERO_INFO[view] || HERO_INFO.home;
  if(view==='teams' && selectedTeam && TEAMS[selectedTeam]){ info = {title: teamFullName(selectedTeam), sub:''}; }
  if(view==='match' && selectedMatch){
    const md = parseMatchRef(selectedMatch);
    if(md) info = {title: `${teamName(md.h)} ${t('vs')} ${teamName(md.a)}`, sub: md.stage};
  }
  document.getElementById('heroTitle').textContent = info.title;
  const subEl = document.getElementById('heroSub');
  subEl.textContent = info.sub;
  subEl.style.display = info.sub ? '' : 'none';
}
let currentView = 'home';
const VIEW_RENDERERS = {
  home: renderHomeView,
  standings: renderStandingsView,
  calendar: renderCalendarView,
  teams: renderTeamsView,
  players: renderPlayersView,
};
let dirtyViews = new Set(Object.keys(VIEW_RENDERERS));
function markAllDirty(){ dirtyViews = new Set(Object.keys(VIEW_RENDERERS)); }
function ensureViewRendered(view){
  if(VIEW_RENDERERS[view] && dirtyViews.has(view)){
    const __t0 = performance.now();
    VIEW_RENDERERS[view]();
    console.log(`[perf] rendu de la vue "${view}" : ${(performance.now()-__t0).toFixed(1)} ms`);
    dirtyViews.delete(view);
  }
}
function renderAll(){
  // Data changed: refresh what's on screen right now instantly, quietly mark
  // the rest as due for a rebuild next time the visitor actually opens that tab.
  markAllDirty();
  ensureViewRendered(currentView);
  if(currentView==='teams' && selectedTeam) dirtyViews.add('teams'); // detail page depends on selection, always fresh
}

let restoringFromHistory = false;
function pushBrowserHistory(){
  if(restoringFromHistory) return; // don't re-push while we're the ones restoring a state
  const state = {view: currentView, selectedTeam, selectedMatch, selectedPlayer};
  let hash = '#'+currentView;
  if(currentView==='teams' && selectedTeam) hash += '/'+selectedTeam;
  if(currentView==='match' && selectedMatch) hash += '/'+encodeURIComponent(selectedMatch);
  if(currentView==='player' && selectedPlayer) hash += '/'+selectedPlayer.tag+'/'+encodeURIComponent(selectedPlayer.name);
  try{ history.pushState(state, '', hash); }
  catch(e){ /* some embedded/sandboxed environments (e.g. a preview iframe) disallow this — harmless to skip there */ }
}
function setView(view){
  const __setViewT0 = performance.now();
  __trace(`setView('${view}') appelé (clic reçu)`);
  currentView = view;
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  document.querySelectorAll('main section').forEach(s=>s.classList.remove('active'));
  const map = {home:'view-home', standings:'view-standings', calendar:'view-calendar', teams:'view-teams', match:'view-match', player:'view-player', players:'view-players', flageditor:'view-flageditor', admin:'view-admin'};
  document.getElementById(map[view]).classList.add('active');
  const adminToggle = document.getElementById('adminToggle');
  if(adminToggle) adminToggle.classList.toggle('on', view==='admin');
  updateHero(view);
  ensureViewRendered(view);
  window.scrollTo(0, 0); // each view starts fresh at the top, never inheriting another view's scroll position
  pushBrowserHistory();
  console.log(`[perf] setView('${view}') total (jusqu'à la fin de la fonction) : ${(performance.now()-__setViewT0).toFixed(1)} ms`);
}
window.addEventListener('popstate', (e)=>{
  restoringFromHistory = true;
  const state = e.state || {view:'home', selectedTeam:null, selectedMatch:null, selectedPlayer:null};
  selectedTeam = state.selectedTeam || null;
  selectedMatch = state.selectedMatch || null;
  selectedPlayer = state.selectedPlayer || null;
  setView(state.view || 'home');
  if(state.view==='teams') renderTeamsView();
  if(state.view==='match') renderMatchDetail(selectedMatch);
  if(state.view==='player' && selectedPlayer) renderPlayerDetail(selectedPlayer.tag, selectedPlayer.name);
  restoringFromHistory = false;
});
document.getElementById('brandLogo').onclick = ()=>{
  navHistory = [];
  selectedTeam = null;
  setView('home');
};
document.querySelectorAll('.navbtn').forEach(b=> b.onclick = ()=>{
  navHistory = [];
  if(b.dataset.view==='teams') selectedTeam = null;
  setView(b.dataset.view);
  if(b.dataset.view==='flageditor') renderFlagEditorView();
  if(b.dataset.view==='teams') renderTeamsView();
});
document.querySelector('main').addEventListener('click', (e)=>{
  const link = e.target.closest('.team-link');
  if(link){
    pushNavHistory();
    selectedTeam = link.dataset.team;
    setView('teams');
    renderTeamsView();
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  const stageLink = e.target.closest('.stage-link');
  if(stageLink){
    setView('standings');
    setTimeout(()=>{
      const target = document.getElementById(stageLink.dataset.anchor);
      if(target){
        target.scrollIntoView({behavior:'smooth', block:'center'});
        target.style.transition = 'box-shadow .3s';
        target.style.boxShadow = '0 0 0 3px var(--gold)';
        setTimeout(()=>{ target.style.boxShadow = ''; }, 1400);
      }
    }, 60);
    return;
  }
  const matchCard = e.target.closest('.match-card');
  if(matchCard){
    pushNavHistory();
    selectedMatch = matchCard.dataset.matchref;
    setView('match');
    renderMatchDetail(selectedMatch);
    window.scrollTo({top:0,behavior:'smooth'});
  }
});
function checkForSecretAdminAccess(){
  if(location.hash.startsWith('#admin')){
    setView('admin');
    renderAdminView();
  }
}
window.addEventListener('hashchange', checkForSecretAdminAccess);

function applyStaticI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
}
function renderLangSwitch(){
  const el = document.getElementById('langSwitch');
  el.innerHTML = LANGS.map(l=>`<button class="${l.code===LANG?'active':''}" data-lang="${l.code}">${l.label}</button>`).join('');
  el.querySelectorAll('button').forEach(b=> b.onclick = async ()=>{
    LANG = b.dataset.lang;
    try{ localStorage.setItem('mkwc_lang_pref', LANG); }catch(e){}
    applyStaticI18n();
    renderLangSwitch();
    updateHero(currentView);
    renderAll();
    if(currentView==='match') renderMatchDetail(selectedMatch);
    if(currentView==='player' && selectedPlayer) renderPlayerDetail(selectedPlayer.tag, selectedPlayer.name);
  });
}
async function loadLangPref(){
  // English by default for a visitor's very first visit; their own past choice
  // (if any) takes over on later visits.
  try{
    const saved = localStorage.getItem('mkwc_lang_pref');
    if(saved && I18N[saved]) LANG = saved;
  }catch(e){ /* stick with the English default */ }
}

(async function init(){
  __trace('init() démarre');
  const startedOnAdmin = location.hash.startsWith('#admin');
  try{ history.replaceState({view:'home', selectedTeam:null, selectedMatch:null}, '', startedOnAdmin ? location.hash : '#home'); }catch(e){}
  const flagCache = loadFlagCacheFromStorage();
  let coldStart = false;
  if(flagCache){
    // Reuse everything from last time — skips both the Supabase round-trip and the
    // (comparatively expensive) client-side flag rasterization entirely.
    FLAG_OVERRIDES = flagCache.overrides || {};
    Object.assign(FLAG_RASTER_CACHE, flagCache.rasters || {});
    hydrateAllRasterURLs();
    __trace('avant loadState (avec flagCache)');
    await loadState();
    __trace('après loadState (avec flagCache)');
    migrateAllPlayerData();
    refreshFlagSymbols();
  } else {
    // COLD START. Only the live tournament data (loadState) must gate first paint.
    // Custom flags are published to a static flags.json file, but every flag also has
    // an in-code generated version (buildFlagInner), so we render immediately from
    // those and pull the published overrides in the BACKGROUND — no blocking round-trip.
    FLAG_OVERRIDES = FLAG_OVERRIDES_BAKED ? {...FLAG_OVERRIDES_BAKED} : {};
    __trace('avant loadState (cold start)');
    await loadState();
    __trace('après loadState (cold start)');
    migrateAllPlayerData();
    refreshFlagSymbols();
    coldStart = true;
  }
  await loadLangPref();
  applyStaticI18n();
  renderLangSwitch();
  updateHero(currentView);
  __trace('avant renderAll (premier rendu)');
  renderAll();
  __trace('après renderAll (premier rendu)');
  if(startedOnAdmin) checkForSecretAdminAccess();
  const loadScreen = document.getElementById('loadScreen');
  if(loadScreen){
    loadScreen.style.transition = 'opacity .25s ease';
    loadScreen.style.opacity = '0';
    setTimeout(()=> loadScreen.remove(), 300);
  }
  __trace('init() terminé, écran de chargement retiré');
  if(coldStart){
    // Off the critical path, once the page is already shown & interactive: fetch
    // any published flag overrides and swap them in live (updating the <symbol>
    // defs re-skins every <use> flag with no DOM rebuild). We no longer rasterize
    // flags to PNG here — the inline SVG rendered via <use href="#flagsym-…"> is
    // visually identical (same source shapes/colors) and free of CPU cost, so the
    // PNG step was pure overhead that stole the main thread right after load.
    const warmFlags = async ()=>{
      __trace('warmFlags() démarre (arrière-plan)');
      try{
        await loadFlagOverridesStatic();  // static flags.json (non-blocking, cacheable, no Supabase dependency)
        __trace('flags.json chargé');
        refreshFlagSymbols();        // live-updates all on-screen flags, no DOM rebuild
        __trace('refreshFlagSymbols terminé');
      }catch(e){ /* keep the baked/generated flags */ }
    };
    if('requestIdleCallback' in window){ requestIdleCallback(()=>warmFlags(), {timeout:2000}); }
    else { setTimeout(warmFlags, 200); }
  }
})();
</script>
